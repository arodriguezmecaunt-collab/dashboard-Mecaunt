      const ec = extColors[ext]||{bg:'#F1F5F9',t:'#475569'};
      const row = el('div',{style:{display:'flex',alignItems:'center',gap:'12px',padding:'10px 14px',background:'#F8FAFC',borderRadius:'10px',border:'1px solid #F1F5F9'}});
      row.append(
        el('span',{style:{padding:'4px 10px',borderRadius:'6px',fontSize:'10px',fontWeight:800,background:ec.bg,color:ec.t,letterSpacing:'0.5px'}},ext),
        el('div',{style:{flex:1,minWidth:0}},
          el('p',{style:{fontSize:'13px',fontWeight:600,color:'#0F172A',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',margin:0}},doc.nombre),
          el('p',{style:{fontSize:'11px',color:'#94A3B8',margin:'2px 0 0'}},fmt(doc.fechaSubida))
        ),
        el('a',{href:doc.url,target:'_blank',style:{padding:'6px 12px',background:'#EEF2FF',color:'#4F46E5',borderRadius:'6px',fontSize:'11px',fontWeight:700,textDecoration:'none',whiteSpace:'nowrap'}},'Abrir'),
        el('button',{className:'trash-btn',onClick:()=>deleteDoc(doc),innerHTML:'\ud83d\uddd1'})
      );
      docList.append(row);
    });
    card2d.append(docList);
  } else {
    card2d.append(el('p',{style:{color:'#94A3B8',fontSize:'13px',textAlign:'center'}},'Sin documentos todavia'));
  }
  c.append(card2d);

  // Vencimientos
  const ev=state.data.vencimientos.filter(v=>v.empresaId===emp.id).sort((a,b)=>(a.venc||'').localeCompare(b.venc||''));
  const card2=el('div',{style:{background:'#fff',borderRadius:'16px',border:'1px solid #E2E8F0',padding:'28px'}});
  card2.append(el('h3',{style:{marginBottom:'16px',fontSize:'16px',fontWeight:700}},'Vencimientos ('+ev.length+')'));
  if(!ev.length) card2.append(el('p',{style:{color:'#94A3B8',fontSize:'13px'}},'Sin vencimientos'));
  ev.forEach(v=>{
    const sc=statusColor(v.venc,v.estado);
    const badge=el('span',{className:'badge'},sc.label);badge.style.background=sc.bg;badge.style.color=sc.text;badge.style.border='1px solid '+sc.border;
    const orgS=el('span',{style:{padding:'3px 8px',borderRadius:'5px',fontSize:'11px',fontWeight:700}},v.org);

      el('span',{style:{fontSize:'12px',fontFamily:"'DM Mono',monospace",fontWeight:600,minWidth:'80px'}},fmt(v.venc)),
      orgS,
      el('span',{style:{flex:1,fontSize:'13px',color:'#475569'}},v.obligacion),
      badge
    ));
  });
  c.append(card2);
}

// ===== HORAS =====
function renderHoras(c) {
  const D=state.data;
  const f=state.filters;
  const empDepto = id => (D.empleados.find(e=>e.id===id)||{}).departamento||'';
  const myDept = myDepto();
  const forcedDept = (!state.isAdmin && myDept) ? myDept : null;

  // Filter
  const filtered = D.horasTrabajadas.filter(h=>{
    if(forcedDept && empDepto(h.empleadoId)!==myDept) return false;
    if(f.horasEnc!=='todos' && h.empleadoId!==f.horasEnc) return false;
    if(f.horasEmp!=='todos' && h.empresaId!==f.horasEmp) return false;
    if(f.horasDesde && (h.fecha||'')<f.horasDesde) return false;
    if(f.horasHasta && (h.fecha||'')>f.horasHasta) return false;
    return true;
  });
  const tot=filtered.reduce((s,h)=>s+Number(h.horas),0);
  const totRound=Math.round(tot*100)/100;

  c.append(makeHeader('Horas',filtered.length+' registros \u00b7 '+totRound+'h',[
    el('button',{className:'btn btn-secondary',onClick:()=>exportXls([...filtered].reverse().map(h=>[fmt(h.fecha),D.empleados.find(e=>e.id===h.empleadoId)?.nombre||'',empName(h.empresaId),h.tipo||'',h.horas,h.descripcion||'']),['Fecha','Empleado','Empresa','Tipo','Horas','Desc'],'horas.xlsx')},'\u2b07 Exportar'),
    el('button',{className:'btn btn-primary',onClick:()=>{state.modals.addHoras=true;render()}},'\u002b Registrar')
  ]));

  // Filters
  const encSel=el('select',{className:'filter-select'});
  encSel.append(el('option',{value:'todos'},'Todos'));
  const horasEmps = forcedDept ? D.empleados.filter(e=>(e.departamento||'')===myDept) : D.empleados;
  horasEmps.forEach(e=>{const o=el('option',{value:e.id},e.nombre);if(f.horasEnc===e.id)o.selected=true;encSel.append(o)});
  encSel.addEventListener('change',e=>{state.filters.horasEnc=e.target.value;render()});

  const empSel=el('select',{className:'filter-select'});
  empSel.append(el('option',{value:'todos'},'Todas empresas'));
  sortedEmps().forEach(e=>{const o=el('option',{value:e.id},e.nombre);if(f.horasEmp===e.id)o.selected=true;empSel.append(o)});
  empSel.addEventListener('change',e=>{state.filters.horasEmp=e.target.value;render()});

  const desde=el('input',{type:'date',className:'filter-select',value:f.horasDesde,'data-fid':'horas-desde'});
  desde.addEventListener('change',e=>{state.filters.horasDesde=e.target.value;render()});
  const hasta=el('input',{type:'date',className:'filter-select',value:f.horasHasta,'data-fid':'horas-hasta'});
  hasta.addEventListener('change',e=>{state.filters.horasHasta=e.target.value;render()});

  const clearBtn=(f.horasEnc!=='todos'||f.horasEmp!=='todos'||f.horasDesde||f.horasHasta)?
    el('button',{className:'btn btn-secondary',style:{padding:'6px 12px',fontSize:'11px'},onClick:()=>{state.filters.horasEnc='todos';state.filters.horasEmp='todos';state.filters.horasDesde='';state.filters.horasHasta='';render()}},'Limpiar filtros'):'';

  c.append(el('div',{style:{display:'flex',flexWrap:'wrap',gap:'10px',marginBottom:'20px',alignItems:'center'}},
    el('span',{style:{fontSize:'12px',fontWeight:600,color:'#64748B'}},'Persona:'),encSel,
    el('span',{style:{fontSize:'12px',fontWeight:600,color:'#64748B'}},'Empresa:'),empSel,
    el('span',{style:{fontSize:'12px',fontWeight:600,color:'#64748B'}},'Desde:'),desde,
    el('span',{style:{fontSize:'12px',fontWeight:600,color:'#64748B'}},'Hasta:'),hasta,
    clearBtn
  ));

  if(!filtered.length){c.append(el('div',{className:'card',style:{padding:'48px',textAlign:'center',color:'#94A3B8'}},'Sin registros'));return;}
  const table=el('table',{className:'table'});
  table.append(el('thead',{},el('tr',{},...['Fecha','Empleado','Empresa','Tipo','Horas','Desc'].map(h=>el('th',{},h)))));
  const tbody=el('tbody');
  [...filtered].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).forEach(h=>{
    const tipoBadge = h.tipo ? el('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 6px',borderRadius:'4px',background:(orgColors[h.tipo]||{bg:'#F1F5F9'}).bg,color:(orgColors[h.tipo]||{text:'#64748B'}).text}},h.tipo) : '';
    tbody.append(el('tr',{},
      el('td',{style:{fontFamily:"'DM Mono',monospace",fontWeight:600}},fmt(h.fecha)),
      el('td',{style:{fontWeight:600}},D.empleados.find(e=>e.id===h.empleadoId)?.nombre||''),
      el('td',{},empName(h.empresaId)),
      el('td',{},tipoBadge),
      el('td',{style:{fontWeight:700,color:'#4F46E5',fontFamily:"'DM Mono',monospace"}},h.horas+'h'),
      el('td',{style:{color:'#94A3B8'}},h.descripcion||'')
    ));
  });
  table.append(tbody);
  c.append(el('div',{style:{background:'#fff',borderRadius:'14px',border:'1px solid #E2E8F0',overflow:'hidden'}},el('div',{style:{overflowX:'auto'}},table)));
}

function renderEquipo(c) {
  if(state.selEmpl) { renderEmpleadoDetail(c); return; }
  c.append(makeHeader('Equipo ('+state.data.empleados.length+')',null,[el('button',{className:'btn btn-primary',onClick:()=>{state.modals.addEmpl=true;render()}},'\u002b Nuevo')]));
  const grid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill, minmax(320px, 1fr))',gap:'16px'}});
  state.data.empleados.forEach(e=>{
    const tot=state.data.horasTrabajadas.filter(h=>h.empleadoId===e.id).reduce((s,h)=>s+Number(h.horas),0);
    const tareas=state.data.tareas.filter(t=>(t.encargadoId===e.id||t.encargadoId2===e.id)&&t.estado!=='completada').length;
    const vencs=state.data.vencimientos.filter(v=>(v.encargadoId===e.id||v.encargadoId2===e.id)&&v.estado!=='completado').length;
    const totalPend=tareas+vencs;
    const card=el('div',{className:'card',style:{padding:'20px',cursor:'pointer'},onClick:()=>{state.selEmpl=e.id;render()}});
    card.addEventListener('mouseenter',()=>card.style.borderColor='#818CF8');
    card.addEventListener('mouseleave',()=>card.style.borderColor='#E2E8F0');
    card.append(
      el('div',{className:'stat-bar',style:{background:e.color}}),
      el('div',{style:{display:'flex',alignItems:'center',gap:'14px'}},
        el('div',{style:{width:'44px',height:'44px',borderRadius:'12px',background:e.color+'20',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',fontWeight:700,color:e.color,flexShrink:0}},e.nombre.charAt(0)),
        el('div',{style:{flex:1,minWidth:0}},
          el('p',{style:{fontSize:'15px',fontWeight:700,color:'#0F172A'}},e.nombre),
          e.cargo?el('p',{style:{fontSize:'12px',color:'#64748B',marginTop:'2px'}},e.cargo):'',
          e.departamento?el('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 8px',borderRadius:'4px',background:deptoC(e.departamento).bg,color:deptoC(e.departamento).text,marginTop:'2px',display:'inline-block'}},deptoC(e.departamento).label):'',
          el('div',{style:{display:'flex',gap:'12px',marginTop:'6px',flexWrap:'wrap'}},
            el('span',{style:{fontSize:'11px',color:'#94A3B8'}},tot+'h registradas'),
            totalPend?el('span',{style:{fontSize:'11px',color:'#D97706',fontWeight:600}},totalPend+' pendientes ('+vencs+'v · '+tareas+'t)'):''
          ),
          (e.telefono||e.email)?el('div',{style:{display:'flex',gap:'12px',marginTop:'6px',flexWrap:'wrap'}},
            e.telefono?el('span',{style:{fontSize:'11px',color:'#64748B'}},'\u260e '+e.telefono):'',
            e.email?el('span',{style:{fontSize:'11px',color:'#64748B'}},'\u2709 '+e.email):''
          ):''
        )
      )
    );
    grid.append(card);
  });
  c.append(grid);
}

function makeFormField(label,type,value,ph) {
  const wrap=el('div',{style:{marginBottom:'16px'}});
  wrap.append(el('label',{style:{display:'block',fontSize:'12px',fontWeight:600,color:'#64748B',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.05em'}},label));
  if(type==='select') {
    const sel=el('select',{className:'select'});
    value.options.forEach(o=>{const op=el('option',{value:o.value},o.label);if(value.selected===o.value)op.selected=true;sel.append(op)});
    wrap.append(sel); wrap._input=sel;
  } else if(type==='textarea') {
    const ta=el('textarea',{value:value||'',placeholder:ph||'',style:{width:'100%',minHeight:'60px',padding:'10px 14px',border:'2px solid #E2E8F0',borderRadius:'10px',fontSize:'14px',fontFamily:"'DM Sans',sans-serif",outline:'none',resize:'vertical',boxSizing:'border-box',background:'#FAFBFC'}});
    wrap.append(ta); wrap._input=ta;
  } else {
    const inp=el('input',{type:type||'text',value:value||'',placeholder:ph||'',className:'input'});
    wrap.append(inp); wrap._input=inp;
  }
  return wrap;
}

      apiPost({action:'delete',sheet:'Plantillas',id:p.id});render();
    },innerHTML:'\ud83d\uddd1'});

    const mesesNombre=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    const freqBadge = el('span',{style:{padding:'3px 8px',borderRadius:'5px',fontSize:'11px',fontWeight:700,

    el('strong',{},'Como funciona: '),

  ));

  // Show link status
  if(sinAcceso.length) {

    missing.append(el('p',{style:{fontSize:'13px',fontWeight:700,color:'#92400E',marginBottom:'8px'}},'\u26a0 '+sinAcceso.length+' empleado(s) sin acceso:'));
    const chips = el('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}});
    sinAcceso.forEach(e=>{
      chips.append(el('span',{style:{fontSize:'12px',padding:'4px 10px',borderRadius:'6px',background:'#FEF3C7',color:'#92400E',fontWeight:600}},e.nombre));
    });
    missing.append(chips);
    c.append(missing);
  }

  if(!accesos.length) {
    c.append(el('div',{className:'card',style:{padding:'48px',textAlign:'center'}},
      el('p',{style:{color:'#94A3B8',fontSize:'14px',marginBottom:'12px'}},'No hay codigos de acceso creados.'),
      el('p',{style:{color:'#94A3B8',fontSize:'13px'}},'Crea el primer codigo con el boton de arriba.')
    ));
    return;
  }

  const table = el('table',{className:'table'});
  table.append(el('thead',{},el('tr',{},
    ...['Nombre','Empleado','Codigo','Rol','Estado','Creado','Acciones'].map(h=>el('th',{},h))
  )));
  const tbody=el('tbody');
  accesos.forEach(a=>{
    const isActive = a.activo!=='false' && a.activo!=='no';
    const isAdm = a.rol==='admin';
    const isSelf = a.codigo===state.accessCode;

    const statusBadge = el('span',{className:'badge',style:{background:isActive?'#ECFDF5':'#FEF2F2',color:isActive?'#059669':'#DC2626',border:'1px solid '+(isActive?'#A7F3D0':'#FECACA')}},isActive?'Activo':'Revocado');
    const rolBadge = el('span',{className:'badge',style:{background:isAdm?'#FEF3C7':'#F0F9FF',color:isAdm?'#B45309':'#0284C7',border:'1px solid '+(isAdm?'#FDE68A':'#BAE6FD')}},isAdm?'Admin':'Usuario');

    const actionsDiv = el('div',{style:{display:'flex',gap:'6px'}});
    if(!isSelf) {
      if(isActive) {
        actionsDiv.append(el('button',{className:'btn btn-danger',style:{padding:'5px 12px',fontSize:'11px'},onClick:()=>{
          a.activo='false';
          apiPost({action:'update',sheet:'Accesos',id:a.id,data:{activo:'false'}});
          render();
        }},'Revocar'));
      } else {
        actionsDiv.append(el('button',{className:'btn btn-secondary',style:{padding:'5px 12px',fontSize:'11px'},onClick:()=>{
          a.activo='true';
          apiPost({action:'update',sheet:'Accesos',id:a.id,data:{activo:'true'}});
          render();
        }},'Reactivar'));
      }
      actionsDiv.append(el('button',{className:'trash-btn',onClick:()=>{
        if(!confirm('Eliminar acceso de '+a.nombre+'?')) return;
        state.data.accesos=state.data.accesos.filter(x=>x.id!==a.id);
        apiPost({action:'delete',sheet:'Accesos',id:a.id});
        render();
      },innerHTML:'\ud83d\uddd1'}));
    } else {
      actionsDiv.append(el('span',{style:{fontSize:'11px',color:'#94A3B8',fontStyle:'italic'}},'(Tu cuenta)'));
    }

    const empLinked = a.empleadoId ? state.data.empleados.find(e=>e.id===a.empleadoId) : null;
    const empCell = empLinked ? el('span',{style:{fontSize:'12px',fontWeight:600,color:empLinked.color||'#4F46E5'}},empLinked.nombre) : el('span',{style:{fontSize:'11px',color:'#CBD5E1'}},'\u2014');

      el('td',{},rolBadge),

      el('td',{style:{fontSize:'12px',color:'#94A3B8'}},a.fechaCreacion?fmt(a.fechaCreacion):'\u2014'),
      el('td',{},actionsDiv)
    ));
  });
  table.append(tbody);
  c.append(el('div',{style:{background:'#fff',borderRadius:'14px',border:'1px solid #E2E8F0',overflow:'hidden'}},el('div',{style:{overflowX:'auto'}},table)));
}

function doComplete(info, minutes, desc, quien, tipo) {
  const {type, item, tickKey, encargadoId} = info;
  const isTarea = type==='tarea';
  const personId = quien || encargadoId;

  // Mark tick
  item[tickKey] = 'true';

  // Calculate new estado
  const has2 = isTarea ? !!item.encargadoId2 : !!item.encargadoId2;
  if(isTarea) {
    item.estado = (has2) ? ((item.tick1==='true'&&item.tick2==='true')?'completada':'pendiente') : 'completada';
    apiPost({action:'update',sheet:'Tareas',id:item.id,data:{tick1:item.tick1||'',tick2:item.tick2||'',estado:item.estado}});
  } else {
    item.estado = (has2) ? ((item.tick1==='true'&&item.tick2==='true')?'completado':'pendiente') : 'completado';
    apiPost({action:'update',sheet:'Vencimientos',id:item.id,data:{tick1:item.tick1||'',tick2:item.tick2||'',estado:item.estado}});
  }

  // Log hours if minutes > 0
  if(minutes > 0 && personId) {
    const horas = Math.round(minutes/60*100)/100;
    const h = {id:'h'+Date.now(),empleadoId:personId,empresaId:item.empresaId||'',fecha:todayStr,horas:horas,tipo:tipo||'',descripcion:desc||''};
    state.data.horasTrabajadas.push(h);
    apiPost({action:'add',sheet:'Horas',data:h});
  }

  // Chain: create next task if fully completed and has chain
  const fullyDone = isTarea ? item.estado==='completada' : item.estado==='completado';
  if(fullyDone && isTarea && item.cadenaDesc && item.cadenaEncargadoId) {
    const nextT = {
      id:'t'+Date.now()+Math.random().toString(36).slice(2,5),
      titulo:item.cadenaDesc,
      descripcion:'Paso siguiente de: '+item.titulo,
      empresaId:item.empresaId||'',
      encargadoId:item.cadenaEncargadoId,
      encargadoId2:'',
      fechaLimite:'',
      prioridad:item.prioridad||'media',
      estado:'pendiente',
      tick1:'',tick2:'',
      cadenaDesc:'',cadenaEncargadoId:'',
      cadenaPadreId:item.id,
      fechaCreacion:todayStr
    };
    state.data.tareas.push(nextT);
    apiPost({action:'add',sheet:'Tareas',data:nextT});
  }

  // Recurrencia: generar próxima instancia si corresponde
  if(fullyDone && isTarea && item.recurrencia) {
    let nextFecha = '';
    if(item.fechaLimite) {
      const d = new Date(item.fechaLimite+'T00:00:00');
      if(item.recurrencia==='mensual') d.setMonth(d.getMonth()+1);
      else if(item.recurrencia==='anual') d.setFullYear(d.getFullYear()+1);
      nextFecha = d.toISOString().slice(0,10);
    }
    const nextT = {
      id:'t'+Date.now()+Math.random().toString(36).slice(2,5),
      titulo:item.titulo,
      descripcion:item.descripcion||'',
      empresaId:item.empresaId||'',
      encargadoId:item.encargadoId||'',
      encargadoId2:item.encargadoId2||'',
      fechaLimite:nextFecha,
      prioridad:item.prioridad||'media',
      recurrencia:item.recurrencia,
      estado:'pendiente',
      tick1:'',tick2:'',
      cadenaDesc:item.cadenaDesc||'',cadenaEncargadoId:item.cadenaEncargadoId||'',
      cadenaPadreId:'',
      fechaCreacion:todayStr
    };
    state.data.tareas.push(nextT);
    apiPost({action:'add',sheet:'Tareas',data:nextT});
    showNotif('🔁 Tarea recurrente regenerada para '+(nextFecha?fmt(nextFecha):'sin fecha'));
  }

  state.modals.completar = null;
  render();
}

function renderAusencias(c) {
  const aus = state.data.ausencias||[];
  const mine = aus.filter(a=>a.nombre===state.accessName);
  const showAll = state.isAdmin;
  const displayed = showAll ? aus : mine;
  const pendientes = displayed.filter(a=>a.aprobado!=='true'&&a.aprobado!=='rechazado');
  const aprobadas = displayed.filter(a=>a.aprobado==='true');

  c.append(makeHeader('Ausencias',
    (showAll?aus.length+' total':mine.length+' mias')+' \u00b7 '+pendientes.length+' pendientes',
    [el('button',{className:'btn btn-primary',onClick:()=>{state.modals.addAusencia=true;render()}},'\u002b Notificar Ausencia')]
  ));

  if(showAll) {
    c.append(el('div',{style:{background:'#FEF3C7',border:'1px solid #FDE68A',borderRadius:'12px',padding:'14px 20px',marginBottom:'20px',fontSize:'13px',color:'#92400E'}},
      '\ud83d\udd12 Vista de admin: ves todas las ausencias del equipo. Solo vos ves esta lista completa.'
    ));
  } else {
    c.append(el('div',{style:{background:'#F0F9FF',border:'1px solid #BAE6FD',borderRadius:'12px',padding:'14px 20px',marginBottom:'20px',fontSize:'13px',color:'#0284C7'}},
      'Aca podes notificar tus ausencias y ver el estado. La justificacion le llega al administrador.'
    ));
  }

  c.append(makeStats([
    {l:'Total',v:displayed.length,c:'#4F46E5'},
    {l:'Pendientes',v:pendientes.length,c:'#D97706'},
    {l:'Aprobadas',v:aprobadas.length,c:'#059669'},
    {l:'Rechazadas',v:displayed.filter(a=>a.aprobado==='rechazado').length,c:'#DC2626'}
  ]));

  if(!displayed.length) {
    c.append(el('div',{className:'card',style:{padding:'48px',textAlign:'center',color:'#94A3B8'}},'Sin ausencias registradas'));
    return;
  }

  const table = el('table',{className:'table'});
  const headers = showAll ? ['Fecha','Persona','Horas','Motivo','Justificacion','Estado','Acciones'] : ['Fecha','Horas','Motivo','Justificacion','Estado'];
  table.append(el('thead',{},el('tr',{},...headers.map(h=>el('th',{},h)))));
  const tbody = el('tbody');

  [...displayed].sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).forEach(a=>{
    const isPend = a.aprobado!=='true'&&a.aprobado!=='rechazado';
    const statusBadge = el('span',{className:'badge',style:{
      background:a.aprobado==='true'?'#ECFDF5':a.aprobado==='rechazado'?'#FEF2F2':'#FFFBEB',
      color:a.aprobado==='true'?'#059669':a.aprobado==='rechazado'?'#DC2626':'#D97706',
      border:'1px solid '+(a.aprobado==='true'?'#A7F3D0':a.aprobado==='rechazado'?'#FECACA':'#FDE68A')
    }},a.aprobado==='true'?'Aprobada':a.aprobado==='rechazado'?'Rechazada':'Pendiente');

    const horas = a.cantHoras||'8';
    const horasBadge = horas==='8' ? el('span',{style:{fontSize:'11px',color:'#64748B'}},'Dia') : el('span',{style:{fontSize:'11px',fontWeight:700,color:'#D97706'}},horas+'h');

    const cells = [];
    cells.push(el('td',{style:{fontFamily:"'DM Mono',monospace",fontWeight:600}},fmt(a.fecha)));
    if(showAll) cells.push(el('td',{style:{fontWeight:600,color:'#0F172A'}},a.nombre||'\u2014'));
    cells.push(el('td',{},horasBadge));
    cells.push(el('td',{style:{color:'#475569'}},a.motivo||''));
    cells.push(el('td',{style:{color:'#64748B',maxWidth:'250px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},a.justificacion||'Sin justificacion'));
    cells.push(el('td',{},statusBadge));

    if(showAll) {
      const actDiv = el('div',{style:{display:'flex',gap:'6px'}});
      if(isPend) {
        actDiv.append(
          el('button',{className:'btn btn-primary',style:{padding:'4px 10px',fontSize:'11px'},onClick:()=>{
            a.aprobado='true';apiPost({action:'update',sheet:'Ausencias',id:a.id,data:{aprobado:'true'}});render();
          }},'Aprobar'),
          el('button',{className:'btn btn-danger',style:{padding:'4px 10px',fontSize:'11px'},onClick:()=>{
            a.aprobado='rechazado';apiPost({action:'update',sheet:'Ausencias',id:a.id,data:{aprobado:'rechazado'}});render();
          }},'Rechazar')
        );
      }
      actDiv.append(el('button',{className:'trash-btn',onClick:()=>{
        state.data.ausencias=state.data.ausencias.filter(x=>x.id!==a.id);
        apiPost({action:'delete',sheet:'Ausencias',id:a.id});render();
      },innerHTML:'\ud83d\uddd1'}));
      cells.push(el('td',{},actDiv));
    }

    tbody.append(el('tr',{style:{opacity:a.aprobado==='rechazado'?0.5:1}},...cells));
  });
  table.append(tbody);
  c.append(el('div',{style:{background:'#fff',borderRadius:'14px',border:'1px solid #E2E8F0',overflow:'hidden'}},el('div',{style:{overflowX:'auto'}},table)));
}

function renderModalAusencia(app) {
  const f0=makeFormField('Tipo','select',{selected:'dia',options:[{value:'dia',label:'Dia completo'},{value:'horas',label:'Algunas horas'}]});
  const f0b=makeFormField('Cantidad de horas','number','2','Ej: 3');
  if(f0b._input) f0b._input.min='0.5'; if(f0b._input) f0b._input.step='0.5';
  f0b.style.display='none';
  f0._input.addEventListener('change',()=>{f0b.style.display=f0._input.value==='horas'?'':'none';f1b.style.display=f0._input.value==='dia'?'':'none'});
  const f1=makeFormField('Fecha desde','date',todayStr);
  const f1b=makeFormField('Fecha hasta','date',todayStr);
  const f2=makeFormField('Motivo','select',{selected:'personal',options:[{value:'personal',label:'Personal'},{value:'enfermedad',label:'Enfermedad'},{value:'familiar',label:'Familiar'},{value:'tramite',label:'Tramite'},{value:'vacaciones',label:'Vacaciones'},{value:'otro',label:'Otro'}]});
  const f3=makeFormField('Justificacion / Detalle','textarea','','Explica brevemente el motivo...');
  const btns=el('div',{style:{display:'flex',gap:'10px',justifyContent:'flex-end'}},
    el('button',{className:'btn btn-secondary',onClick:()=>{state.modals={};render()}},'Cancelar'),
    el('button',{className:'btn btn-primary',onClick:async()=>{
      const tipoAus=f0._input.value,desde=f1._input.value,hasta=f1b._input.value||desde,motivo=f2._input.value,justificacion=f3._input.value;
      if(!desde) return;
      if(!state.data.ausencias) state.data.ausencias=[];
      if(tipoAus==='horas') {
        const cantHoras=Number(f0b._input.value)||2;
        const a={id:'aus'+Date.now(),nombre:state.accessName,fecha:desde,motivo,cantHoras:String(cantHoras),justificacion:justificacion+' ('+cantHoras+'h)',aprobado:'pendiente',fechaCreacion:todayStr};
        state.data.ausencias.push(a);
        await apiPost({action:'add',sheet:'Ausencias',data:a});
      } else {
        const d1=new Date(desde+'T12:00:00'), d2=new Date(hasta+'T12:00:00');
        if(d2<d1) { state.error='Fecha hasta debe ser >= desde'; render(); return; }
        const days=Math.round((d2-d1)/86400000)+1;
        for(let i=0;i<days;i++){
          const dt=new Date(d1.getTime()+i*86400000);
          const fecha=dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());
          const a={id:'aus'+Date.now()+Math.random().toString(36).slice(2,5),nombre:state.accessName,fecha,motivo,cantHoras:'8',justificacion:justificacion+(days>1?' ('+days+' dias: '+fmt(desde)+' al '+fmt(hasta)+')':''),aprobado:'pendiente',fechaCreacion:todayStr};
          state.data.ausencias.push(a);
          await apiPost({action:'add',sheet:'Ausencias',data:a});
        }
      }
      state.modals={};render();
    }},'Enviar Justificacion')
  );
  makeModal('Notificar Ausencia',[
    el('div',{style:{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'10px',padding:'12px',marginBottom:'16px',fontSize:'12px',color:'#92400E',lineHeight:'1.6'}},
      'Podes cargar un dia completo, un periodo, o solo unas horas.'
    ),
    f0,f0b,f1,f1b,f2,f3,btns
  ],app);
}

function renderModalComentario(app) {

    listDiv.append(el('div',{style:{padding:'8px 0',borderBottom:'1px solid #F1F5F9'}},

        el('span',{style:{fontSize:'10px',color:'#CBD5E1'}},fmt(cm.fecha)+' '+(cm.hora||''))
      ),
      el('p',{style:{margin:'4px 0 0',fontSize:'13px',color:'#475569'}},cm.texto)
    ));
  });

  const fTexto = makeFormField('Nuevo comentario','textarea','','Ej: Ya llame al cliente, falta firma...');

    el('button',{className:'btn btn-primary',onClick:()=>{
      const texto = fTexto._input.value.trim();
      if(!texto) return;
      const now = new Date();
      const cm = {id:'cm'+Date.now(),refType:info.refType,refId:info.refId,autor:state.accessName||'',texto,fecha:todayStr,hora:pad2(now.getHours())+':'+pad2(now.getMinutes())};

      render();
    }},'Enviar')
  );

  makeModal('Comentarios: '+info.refLabel.substring(0,35),[listDiv,fTexto,btns],app);

async function cargarDatosInicialesLicencias() {
  if(!confirm('¿Cargar los saldos iniciales de Yure, Silvia y Vero? Esto va a escribir en tu Google Sheet.')) return;

  // Resuelve empleadoId por nombre (busca en state.data.empleados)
  const resolveEmp = (nombre) => {
    const emp = state.data.empleados.find(e => (e.nombre||'').toUpperCase().includes(nombre.toUpperCase()) || nombre.toUpperCase().includes((e.nombre||'').toUpperCase()));
    return emp ? emp.id : nombre; // fallback al nombre si no lo encuentra
  };

  const movs = LIC_INICIAL.movimientos.map(m => ({...m, empleadoId: resolveEmp(m.empleadoId)}));
  const plan = LIC_INICIAL.planificacion;

  state.data.licencias = movs;
  state.data.licPlanificacion = plan;
  render();

  showNotif('⏳ Guardando datos en Google Sheets...');
  for(const m of movs) await apiPost({action:'add', sheet:'Licencias', data:m});
  for(const p of plan) await apiPost({action:'add', sheet:'LicPlanificacion', data:p});
  showNotif('✅ Datos iniciales cargados correctamente');
  render();
}

// Agrupa movimientos por empleado
function getLicResumen() {
  const movs = state.data.licencias || [];
  const empleados = state.data.empleados || [];
  const map = {};
  movs.forEach(m => {
    if(!m.empleadoId) return;
    if(!map[m.empleadoId]) map[m.empleadoId] = {reglamentaria:[], estudio:{}};
    if(m.tipo==='reglamentaria') {
      map[m.empleadoId].reglamentaria.push(m);
    } else if(m.tipo==='estudio') {
      const yr = m.año||'?';
      if(String(yr) !== String(new Date().getFullYear())) return; // solo año actual
      if(!map[m.empleadoId].estudio[yr]) map[m.empleadoId].estudio[yr]=[];
      map[m.empleadoId].estudio[yr].push(m);
    }
  });
  return empleados.filter(e=>map[e.id]).map(e=>{
    const data = map[e.id];
    const regMovs = data.reglamentaria.sort((a,b)=>(a.fechaCreacion||'').localeCompare(b.fechaCreacion||''));
    const regSaldo = regMovs.length ? Number(regMovs[regMovs.length-1].saldoResultante)||0 : 0;
    const regGen = regMovs.filter(m=>Number(m.dias)>0).reduce((s,m)=>s+Number(m.dias),0);
    const estudio = Object.keys(data.estudio).sort().map(yr=>{
      const yMovs = data.estudio[yr].sort((a,b)=>(a.fechaCreacion||'').localeCompare(b.fechaCreacion||''));
      return {año:yr, saldo:Number(yMovs[yMovs.length-1].saldoResultante)||0, generada:yMovs.filter(m=>Number(m.dias)>0).reduce((s,m)=>s+Number(m.dias),0), movimientos:yMovs};
    });
    const ingreso = regMovs[0]?.ingreso||'';
    return {id:e.id, nombre:e.nombre, ingreso, reglamentaria:{saldo:regSaldo,generada:regGen,movimientos:regMovs}, estudio};
  });
}

function licColorPorNombre(nombre) {
  const cols=['#6366F1','#F43F5E','#F59E0B','#10B981','#8B5CF6','#EC4899','#0EA5E9','#14B8A6','#F97316','#64748B','#A855F7'];
  let h=0; for(let i=0;i<nombre.length;i++) h=nombre.charCodeAt(i)+((h<<5)-h);
  return cols[Math.abs(h)%cols.length];
}

function fechaAMesPlan(fecha) {
  if(!fecha) return '';
  const mC=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const p=fecha.split('/');
  if(p.length<3) return '';
  const m=parseInt(p[1]), y=p[2].length===4?p[2]:'20'+p[2];
  return m>=1&&m<=12?mC[m]+' '+y:'';
}

const MESES_LABELS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
function getMesesPlan(n) {
  const hoy = new Date();
  const meses = [];
  for(let i=0; i<n; i++) {
    const d = new Date(hoy.getFullYear(), hoy.getMonth()+i, 1);
    meses.push(MESES_LABELS[d.getMonth()]+' '+d.getFullYear());
  }
  return meses;
}

function aprobarSolicitud(s) {
  if(!confirm('¿Aprobar solicitud de '+s.empleadoNombre+'?\n'+s.fechaDesde+(s.fechaHasta&&s.fechaHasta!==s.fechaDesde?' → '+s.fechaHasta:'')+(s.dias?'\nDías: '+s.dias:''))) return;
  
  s.estado='aprobada';
  apiPost({action:'update',sheet:'LicSolicitudes',id:s.id,data:{estado:'aprobada'}});
  
  // Calcular nuevo saldo
  const movs=(state.data.licencias||[]).filter(m=>m.empleadoId===s.empleadoId&&m.tipo===s.tipo);
  const saldoActual=movs.length?Number(movs[movs.length-1].saldoResultante)||0:0;
  const dias=Number(s.dias)||0;
  const nuevoSaldo=saldoActual-dias;
  
  // Registrar movimiento en Licencias
  const mov={
    id:'lic'+Date.now(),
    empleadoId:s.empleadoId,
    tipo:s.tipo,
    año:s.año||String(new Date().getFullYear()),
    descripcion:'Licencia Gozada',
    fecha:s.fechaDesde+(s.fechaHasta&&s.fechaHasta!==s.fechaDesde?' - '+s.fechaHasta:''),
    dias:String(-dias),
    saldoResultante:String(nuevoSaldo),
    ingreso:'',
    fechaCreacion:new Date().toISOString().slice(0,10)
  };
  if(!state.data.licencias) state.data.licencias=[];
  state.data.licencias.push(mov);
  apiPost({action:'add',sheet:'Licencias',data:mov});
  
  // Agregar a planificación
  if(!state.data.licPlanificacion) state.data.licPlanificacion=[];
  const mesPlan=fechaAMesPlan(s.fechaDesde);
  if(mesPlan) {
    const diaDesde=(s.fechaDesde||'').split('/')[0]||'1';
    const diaHasta=(s.fechaHasta&&s.fechaHasta!==s.fechaDesde?s.fechaHasta:s.fechaDesde||'').split('/')[0]||diaDesde;
    const p={
      id:'lp'+Date.now(),
      nombre:s.empleadoNombre,
      color:licColorPorNombre(s.empleadoNombre||''),
      mes:mesPlan,
      desde:diaDesde,
      hasta:diaHasta
    };
    state.data.licPlanificacion.push(p);
    apiPost({action:'add',sheet:'LicPlanificacion',data:p});
  }
  
  render();
  showNotif('✅ Aprobada. Nuevo saldo de '+s.empleadoNombre+': <b>'+nuevoSaldo+' días</b>');
}

function renderModalLicSolicitud(app) {
  const myId=myEmpleadoId();
  const empleados=state.data.empleados||[];
  const fTipo=makeFormField('Tipo','select',{selected:'reglamentaria',options:[{value:'reglamentaria',label:'🏖️ Reglamentaria'},{value:'estudio',label:'📚 Por Estudio'}]});
  const fAño=makeFormField('Año','text',String(new Date().getFullYear()),'');
  const fDesde=makeFormField('Fecha desde','text','','dd/mm/aaaa');
  const fHasta=makeFormField('Fecha hasta','text','','dd/mm/aaaa — mismo día si es uno solo');

  const saldoDiv=el('div',{style:{background:'#EEF2FF',borderRadius:'8px',padding:'10px 14px',fontSize:'13px',color:'#4F46E5',marginBottom:'4px',fontWeight:600}},'Saldo disponible: —');
  const updSaldo=()=>{
    const movs=(state.data.licencias||[]).filter(m=>m.empleadoId===myId&&m.tipo===fTipo._input.value);
    const s=movs.length?Number(movs[movs.length-1].saldoResultante)||0:0;
    saldoDiv.textContent='Saldo disponible: '+s+' días'+(s<=0?' ⚠️ Sin saldo':'');
    saldoDiv.style.background=s>0?'#EEF2FF':'#FEF2F2';
    saldoDiv.style.color=s>0?'#4F46E5':'#DC2626';
  };
  fTipo._input.addEventListener('change',updSaldo);
  setTimeout(updSaldo,100);

  const btns=el('div',{style:{display:'flex',gap:'10px',justifyContent:'flex-end'}},
    el('button',{className:'btn btn-secondary',onClick:()=>{state.modals.licSolic=null;render();}},'Cancelar'),
    el('button',{className:'btn btn-primary',onClick:()=>{
      const tipo=fTipo._input.value,año=fAño._input.value.trim(),desde=fDesde._input.value.trim(),hasta=fHasta._input.value.trim()||desde;
      if(!desde){alert('Ingresá la fecha desde');return;}
      let dias=1;
      try{const[d1,m1,y1]=desde.split('/').map(Number);const[d2,m2,y2]=hasta.split('/').map(Number);dias=Math.max(1,Math.round((new Date(y2,m2-1,d2)-new Date(y1,m1-1,d1))/(864e5))+1);}catch(e){}
      const emp=empleados.find(e=>e.id===myId);
      const sol={id:'sol'+Date.now(),empleadoId:myId,empleadoNombre:emp?emp.nombre:myId,tipo,año,fechaDesde:desde,fechaHasta:hasta,dias:String(dias),estado:'pendiente',motivoRechazo:'',fechaCreacion:new Date().toISOString().slice(0,10)};
      if(!state.data.licSolicitudes)state.data.licSolicitudes=[];
      state.data.licSolicitudes.push(sol);
      apiPost({action:'add',sheet:'LicSolicitudes',data:sol});
      state.modals.licSolic=null;state.licTab='solicitudes';render();
      showNotif('📋 Solicitud enviada, quedá pendiente de aprobación.');
    }},'📋 Enviar solicitud')
  );
  makeModal('🏖️ Solicitar licencia',[saldoDiv,fTipo,fAño,fDesde,fHasta,btns],app);
}

    }},'💾 Guardar')
  );
  makeModal('✏️ Editar período',[fNombre,fMes,fDesde,fHasta,btns],app);
}

function renderModalAddLicRest(app) {
  const fMes=makeFormField('Mes','select',{selected:'',options:[{value:'',label:'Elegí mes'},...getMesesPlan(18).map(m=>({value:m,label:m}))]});
  const fDia=makeFormField('Día desde','text','','Ej: 20');
  const fHasta=makeFormField('Día hasta (si es rango)','text','','Ej: 26 — dejar vacío si es un día');
  const fMot=makeFormField('Motivo','text','','Ej: Cierre anual');
  const btns=el('div',{style:{display:'flex',gap:'10px',justifyContent:'flex-end'}},
    el('button',{className:'btn btn-secondary',onClick:()=>{state.modals.addLicRest=null;render();}},'Cancelar'),
    el('button',{className:'btn btn-primary',onClick:()=>{
      const mes=fMes._input.value,dia=fDia._input.value.trim(),hasta=fHasta._input.value.trim(),motivo=fMot._input.value.trim();
      if(!mes||!dia){alert('Elegí mes y día');return;}
      const r={id:'lr'+Date.now(),mes,dia,hasta:hasta||dia,motivo};
      state.data.licRestringidos.push(r);
      apiPost({action:'add',sheet:'LicRestringidos',data:r});
      state.modals.addLicRest=null;render();
    }},'💾 Agregar')
  );
  makeModal('🚫 Agregar días restringidos',[fMes,fDia,fHasta,fMot,btns],app);
}

// INIT
if(state.apiUrl && state.accessCode) {
  connect(state.apiUrl, state.accessCode);
} else {
  state.loading = false;
  render();
}
// Auto-refresh every 5 minutes
setInterval(silentRefresh, 5 * 60 * 1000);
</script>
</body>
