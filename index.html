function renderModalPlantilla(app) {
  const f1=makeFormField('Dia del mes','number','','Ej: 20');
  if(f1._input) f1._input.min='1'; if(f1._input) f1._input.max='31';

  // Multi-select empresas
  const selectedEmps = new Set();
  const empWrap = el('div',{style:{marginBottom:'16px'}});
  empWrap.append(el('label',{style:{display:'block',fontSize:'12px',fontWeight:600,color:'#64748B',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.05em'}},'Empresas'));
  const empSearch = el('input',{placeholder:'Buscar empresa...',style:{width:'100%',padding:'8px 12px',border:'2px solid #E2E8F0',borderRadius:'8px',fontSize:'13px',fontFamily:"'DM Sans',sans-serif",marginBottom:'8px',boxSizing:'border-box',outline:'none'}});
  const empList = el('div',{style:{maxHeight:'150px',overflowY:'auto',border:'1px solid #E2E8F0',borderRadius:'8px',padding:'4px'}});
  const countLabel = el('span',{style:{fontSize:'11px',color:'#4F46E5',fontWeight:600}},'0 seleccionadas');
  const selectAll = el('button',{style:{fontSize:'11px',color:'#4F46E5',background:'none',border:'none',cursor:'pointer',fontWeight:600,fontFamily:"'DM Sans',sans-serif"},onClick:()=>{
    const q=empSearch.value.toLowerCase();sortedEmps().filter(e=>!q||e.nombre.toLowerCase().includes(q)).forEach(e=>selectedEmps.add(e.id));rebuildList();
  }},'Todas');
  const deselectAll = el('button',{style:{fontSize:'11px',color:'#DC2626',background:'none',border:'none',cursor:'pointer',fontWeight:600,fontFamily:"'DM Sans',sans-serif"},onClick:()=>{selectedEmps.clear();rebuildList();}},'Ninguna');
  function rebuildList(){
    empList.innerHTML='';const q=empSearch.value.toLowerCase();
    sortedEmps().filter(e=>!q||e.nombre.toLowerCase().includes(q)).forEach(e=>{
      const checked=selectedEmps.has(e.id);
      const row=el('label',{style:{display:'flex',alignItems:'center',gap:'8px',padding:'4px 8px',cursor:'pointer',borderRadius:'6px',fontSize:'13px',color:'#0F172A',background:checked?'#EEF2FF':'transparent'}});
      const cb=el('input',{type:'checkbox'});cb.checked=checked;
      cb.addEventListener('change',()=>{if(cb.checked)selectedEmps.add(e.id);else selectedEmps.delete(e.id);rebuildList()});
      row.append(cb,e.nombre);empList.append(row);
    });
    countLabel.textContent=selectedEmps.size+' seleccionada'+(selectedEmps.size!==1?'s':'');
  }
  empSearch.addEventListener('input',rebuildList);rebuildList();
  empWrap.append(el('div',{style:{display:'flex',gap:'12px',alignItems:'center',marginBottom:'6px'}},countLabel,selectAll,deselectAll));
  empWrap.append(empSearch,empList);

  const f3=makeFormField('Organismo','select',{selected:'DGI',options:[{value:'DGI',label:'DGI'},{value:'BPS',label:'BPS'},{value:'ANV',label:'ANV'},{value:'CONTAB.',label:'CONTAB.'},{value:'SUELDOS',label:'SUELDOS'}]});
  const f4=makeFormField('Obligacion','text','','Ej: DJ IVA mensual');
  const f5=makeFormField('Encargado 1','select',{selected:'',options:[{value:'',label:'Sin asignar'},...state.data.empleados.map(e=>({value:e.id,label:e.nombre}))]});
  const f5b=makeFormField('Encargado 2 (opcional)','select',{selected:'',options:[{value:'',label:'Ninguno'},...state.data.empleados.map(e=>({value:e.id,label:e.nombre}))]});
  const fFreq=makeFormField('Frecuencia','select',{selected:'mensual',options:[{value:'mensual',label:'🔁 Mensual (todos los meses)'},{value:'anual',label:'📅 Anual (una vez por año)'}]});
  const mesesOpts=[{value:'1',label:'Enero'},{value:'2',label:'Febrero'},{value:'3',label:'Marzo'},{value:'4',label:'Abril'},{value:'5',label:'Mayo'},{value:'6',label:'Junio'},{value:'7',label:'Julio'},{value:'8',label:'Agosto'},{value:'9',label:'Septiembre'},{value:'10',label:'Octubre'},{value:'11',label:'Noviembre'},{value:'12',label:'Diciembre'}];
  const fMes=makeFormField('Mes del año','select',{selected:String(new Date().getMonth()+1),options:mesesOpts});
  fMes.style.display='none';
  fFreq._input.addEventListener('change',()=>{ fMes.style.display=fFreq._input.value==='anual'?'block':'none'; });
  const btns=el('div',{style:{display:'flex',gap:'10px',justifyContent:'flex-end'}},
    el('button',{className:'btn btn-secondary',onClick:()=>{state.modals={};render()}},'Cancelar'),
    el('button',{className:'btn btn-primary',onClick:async()=>{
      const dia=f1._input.value,org=f3._input.value,obligacion=f4._input.value,encargadoId=f5._input.value,encargadoId2=f5b._input.value;
      const frecuencia=fFreq._input.value, mes=fFreq._input.value==='anual'?fMes._input.value:'';
      if(!dia||!selectedEmps.size||!obligacion) return;
      const nowM=new Date().getMonth()+1, nowY=new Date().getFullYear();
      const pfx=nowY+'-'+pad2(nowM);
      const maxD=lastDay(nowY,nowM);
      const d2=Math.min(Number(dia),maxD);
      for(const empresaId of selectedEmps) {
        const p={id:'pl'+Date.now()+Math.random().toString(36).slice(2,6),dia:String(dia),empresaId,org,obligacion,encargadoId,encargadoId2,frecuencia,mes};
        if(!state.data.plantillas) state.data.plantillas=[];
        state.data.plantillas.push(p);
        await apiPost({action:'add',sheet:'Plantillas',data:p});
        // Genera vencimiento para el mes actual si corresponde
        const generar = frecuencia==='mensual' || (frecuencia==='anual' && String(nowM)===String(mes));
        if(generar) {
          const yaExiste = state.data.vencimientos.some(v =>
            String(v.empresaId) === String(empresaId) && v.org === org &&
            (v.obligacion||'').trim().toUpperCase() === (obligacion||'').trim().toUpperCase() &&
            (v.venc||'').startsWith(pfx)
          );
          if(!yaExiste) {
            const v={id:'v'+Date.now()+Math.random().toString(36).slice(2,6),empresaId,venc:pfx+'-'+pad2(d2),org,obligacion,estado:'pendiente',encargadoId,encargadoId2,tick1:'',tick2:''};
            state.data.vencimientos.push(v);
            await apiPost({action:'add',sheet:'Vencimientos',data:v});
          }
        }
      }
      state.modals={};render();
    }},'Crear Plantilla')
  );
  makeModal('Nueva Plantilla Recurrente',[f1,empWrap,f3,f4,f5,f5b,fFreq,fMes,btns],app);
}

function doComplete(info, minutes, desc, quien, tipo) {
  const {type, item, tickKey, encargadoId} = info;
  const isTarea = type==='tarea';
  const personId = quien || encargadoId;

  // Mark tick
  item[tickKey] = 'true';

  // Calculate new estado
  const has2 = isTarea ? !!item.encargadoId2 : !!item.encargadoId2;
  if(isTarea) {
    item.estado = (has2) ? ((item.tick1==='true'&&item.tick2==='true')?'completada':'pendiente') : 'completada';
    apiPost({action:'update',sheet:'Tareas',id:item.id,data:{tick1:item.tick1||'',tick2:item.tick2||'',estado:item.estado}});
  } else {
    item.estado = (has2) ? ((item.tick1==='true'&&item.tick2==='true')?'completado':'pendiente') : 'completado';
    apiPost({action:'update',sheet:'Vencimientos',id:item.id,data:{tick1:item.tick1||'',tick2:item.tick2||'',estado:item.estado}});
  }

  // Log hours if minutes > 0
  if(minutes > 0 && personId) {
    const horas = Math.round(minutes/60*100)/100;
    const h = {id:'h'+Date.now(),empleadoId:personId,empresaId:item.empresaId||'',fecha:todayStr,horas:horas,tipo:tipo||'',descripcion:desc||''};
    state.data.horasTrabajadas.push(h);
    apiPost({action:'add',sheet:'Horas',data:h});
  }

  // Chain: create next task if fully completed and has chain
  const fullyDone = isTarea ? item.estado==='completada' : item.estado==='completado';
  if(fullyDone && isTarea && item.cadenaDesc && item.cadenaEncargadoId) {
    const nextT = {
      id:'t'+Date.now()+Math.random().toString(36).slice(2,5),
      titulo:item.cadenaDesc,
      descripcion:'Paso siguiente de: '+item.titulo,
      empresaId:item.empresaId||'',
      encargadoId:item.cadenaEncargadoId,
      encargadoId2:'',
      fechaLimite:'',
      prioridad:item.prioridad||'media',
      estado:'pendiente',
      tick1:'',tick2:'',
      cadenaDesc:'',cadenaEncargadoId:'',
      cadenaPadreId:item.id,
      fechaCreacion:todayStr
    };
    state.data.tareas.push(nextT);
    apiPost({action:'add',sheet:'Tareas',data:nextT});
  }

  // Recurrencia: generar próxima instancia si corresponde
  if(fullyDone && isTarea && item.recurrencia) {
    let nextFecha = '';
    if(item.fechaLimite) {
      const d = new Date(item.fechaLimite+'T00:00:00');
      if(item.recurrencia==='mensual') d.setMonth(d.getMonth()+1);
      else if(item.recurrencia==='anual') d.setFullYear(d.getFullYear()+1);
      nextFecha = d.toISOString().slice(0,10);
    }
    const nextT = {
      id:'t'+Date.now()+Math.random().toString(36).slice(2,5),
      titulo:item.titulo,
      descripcion:item.descripcion||'',
      empresaId:item.empresaId||'',
      encargadoId:item.encargadoId||'',
      encargadoId2:item.encargadoId2||'',
      fechaLimite:nextFecha,
      prioridad:item.prioridad||'media',
      recurrencia:item.recurrencia,
      estado:'pendiente',
      tick1:'',tick2:'',
      cadenaDesc:item.cadenaDesc||'',cadenaEncargadoId:item.cadenaEncargadoId||'',
      cadenaPadreId:'',
      fechaCreacion:todayStr
    };
    state.data.tareas.push(nextT);
    apiPost({action:'add',sheet:'Tareas',data:nextT});
    showNotif('🔁 Tarea recurrente regenerada para '+(nextFecha?fmt(nextFecha):'sin fecha'));
  }

  state.modals.completar = null;
  render();
}

      },innerHTML:'\ud83d\uddd1'}));
      cells.push(el('td',{},actDiv));
    }

    tbody.append(el('tr',{style:{opacity:a.aprobado==='rechazado'?0.5:1}},...cells));
  });
  table.append(tbody);
  c.append(el('div',{style:{background:'#fff',borderRadius:'14px',border:'1px solid #E2E8F0',overflow:'hidden'}},el('div',{style:{overflowX:'auto'}},table)));
}

function renderModalAusencia(app) {
  const f0=makeFormField('Tipo','select',{selected:'dia',options:[{value:'dia',label:'Dia completo'},{value:'horas',label:'Algunas horas'}]});
  const f0b=makeFormField('Cantidad de horas','number','2','Ej: 3');
  if(f0b._input) f0b._input.min='0.5'; if(f0b._input) f0b._input.step='0.5';
  f0b.style.display='none';
  f0._input.addEventListener('change',()=>{f0b.style.display=f0._input.value==='horas'?'':'none';f1b.style.display=f0._input.value==='dia'?'':'none'});
  const f1=makeFormField('Fecha desde','date',todayStr);
  const f1b=makeFormField('Fecha hasta','date',todayStr);
  const f2=makeFormField('Motivo','select',{selected:'personal',options:[{value:'personal',label:'Personal'},{value:'enfermedad',label:'Enfermedad'},{value:'familiar',label:'Familiar'},{value:'tramite',label:'Tramite'},{value:'vacaciones',label:'Vacaciones'},{value:'otro',label:'Otro'}]});
  const f3=makeFormField('Justificacion / Detalle','textarea','','Explica brevemente el motivo...');
  const btns=el('div',{style:{display:'flex',gap:'10px',justifyContent:'flex-end'}},
    el('button',{className:'btn btn-secondary',onClick:()=>{state.modals={};render()}},'Cancelar'),
    el('button',{className:'btn btn-primary',onClick:async()=>{
      const tipoAus=f0._input.value,desde=f1._input.value,hasta=f1b._input.value||desde,motivo=f2._input.value,justificacion=f3._input.value;
      if(!desde) return;
      if(!state.data.ausencias) state.data.ausencias=[];
      if(tipoAus==='horas') {
        const cantHoras=Number(f0b._input.value)||2;
        const a={id:'aus'+Date.now(),nombre:state.accessName,fecha:desde,motivo,cantHoras:String(cantHoras),justificacion:justificacion+' ('+cantHoras+'h)',aprobado:'pendiente',fechaCreacion:todayStr};
        state.data.ausencias.push(a);
        await apiPost({action:'add',sheet:'Ausencias',data:a});
      } else {
        const d1=new Date(desde+'T12:00:00'), d2=new Date(hasta+'T12:00:00');
        if(d2<d1) { state.error='Fecha hasta debe ser >= desde'; render(); return; }
        const days=Math.round((d2-d1)/86400000)+1;
        for(let i=0;i<days;i++){
          const dt=new Date(d1.getTime()+i*86400000);
          const fecha=dt.getFullYear()+'-'+pad2(dt.getMonth()+1)+'-'+pad2(dt.getDate());
          const a={id:'aus'+Date.now()+Math.random().toString(36).slice(2,5),nombre:state.accessName,fecha,motivo,cantHoras:'8',justificacion:justificacion+(days>1?' ('+days+' dias: '+fmt(desde)+' al '+fmt(hasta)+')':''),aprobado:'pendiente',fechaCreacion:todayStr};
          state.data.ausencias.push(a);
          await apiPost({action:'add',sheet:'Ausencias',data:a});
        }
      }
      state.modals={};render();
    }},'Enviar Justificacion')
  );
  makeModal('Notificar Ausencia',[
    el('div',{style:{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'10px',padding:'12px',marginBottom:'16px',fontSize:'12px',color:'#92400E',lineHeight:'1.6'}},
      'Podes cargar un dia completo, un periodo, o solo unas horas.'
    ),
    f0,f0b,f1,f1b,f2,f3,btns
  ],app);
}

function renderModalComentario(app) {
  const info = state.modals.comentario;
  if(!info) return;
  const comments = (state.data.comentarios||[]).filter(cm=>cm.refId===info.refId).sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));

  const listDiv = el('div',{style:{maxHeight:'200px',overflowY:'auto',marginBottom:'16px'}});
  if(!comments.length) listDiv.append(el('p',{style:{color:'#94A3B8',fontSize:'13px',textAlign:'center',padding:'12px'}},'Sin comentarios todavia'));
  comments.forEach(cm=>{
    listDiv.append(el('div',{style:{padding:'8px 0',borderBottom:'1px solid #F1F5F9'}},
      el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        el('span',{style:{fontSize:'12px',fontWeight:700,color:'#4F46E5'}},cm.autor||''),
        el('span',{style:{fontSize:'10px',color:'#CBD5E1'}},fmt(cm.fecha)+' '+(cm.hora||''))
      ),
      el('p',{style:{margin:'4px 0 0',fontSize:'13px',color:'#475569'}},cm.texto)
    ));
  });

  const fTexto = makeFormField('Nuevo comentario','textarea','','Ej: Ya llame al cliente, falta firma...');
  const btns = el('div',{style:{display:'flex',gap:'10px',justifyContent:'flex-end'}},
    el('button',{className:'btn btn-secondary',onClick:()=>{state.modals.comentario=null;render()}},'Cerrar'),
    el('button',{className:'btn btn-primary',onClick:()=>{
      const texto = fTexto._input.value.trim();
      if(!texto) return;
      const now = new Date();
      const cm = {id:'cm'+Date.now(),refType:info.refType,refId:info.refId,autor:state.accessName||'',texto,fecha:todayStr,hora:pad2(now.getHours())+':'+pad2(now.getMinutes())};
      if(!state.data.comentarios) state.data.comentarios=[];
      state.data.comentarios.push(cm);
      apiPost({action:'add',sheet:'Comentarios',data:cm});
      fTexto._input.value='';
      state.modals.comentario=null;
      state.modals.comentario={refType:info.refType,refId:info.refId,refLabel:info.refLabel};
      render();
    }},'Enviar')
  );

  makeModal('Comentarios: '+info.refLabel.substring(0,35),[listDiv,fTexto,btns],app);
}

async function cargarDatosInicialesLicencias() {
  if(!confirm('¿Cargar los saldos iniciales de Yure, Silvia y Vero? Esto va a escribir en tu Google Sheet.')) return;

  // Resuelve empleadoId por nombre (busca en state.data.empleados)
  const resolveEmp = (nombre) => {
    const emp = state.data.empleados.find(e => (e.nombre||'').toUpperCase().includes(nombre.toUpperCase()) || nombre.toUpperCase().includes((e.nombre||'').toUpperCase()));
    return emp ? emp.id : nombre; // fallback al nombre si no lo encuentra
  };

  const movs = LIC_INICIAL.movimientos.map(m => ({...m, empleadoId: resolveEmp(m.empleadoId)}));
  const plan = LIC_INICIAL.planificacion;

  state.data.licencias = movs;
  state.data.licPlanificacion = plan;
  render();

  showNotif('⏳ Guardando datos en Google Sheets...');
  for(const m of movs) await apiPost({action:'add', sheet:'Licencias', data:m});
  for(const p of plan) await apiPost({action:'add', sheet:'LicPlanificacion', data:p});
  showNotif('✅ Datos iniciales cargados correctamente');
  render();
}

// Agrupa movimientos por empleado
function getLicResumen() {
  const movs = state.data.licencias || [];
  const empleados = state.data.empleados || [];
  const map = {};
  movs.forEach(m => {
    if(!m.empleadoId) return;
    if(!map[m.empleadoId]) map[m.empleadoId] = {reglamentaria:[], estudio:{}};
    if(m.tipo==='reglamentaria') {
      map[m.empleadoId].reglamentaria.push(m);
    } else if(m.tipo==='estudio') {
      const yr = m.año||'?';
      if(String(yr) !== String(new Date().getFullYear())) return; // solo año actual
      if(!map[m.empleadoId].estudio[yr]) map[m.empleadoId].estudio[yr]=[];
      map[m.empleadoId].estudio[yr].push(m);
    }
  });
  return empleados.filter(e=>map[e.id]).map(e=>{
    const data = map[e.id];
    const regMovs = data.reglamentaria.sort((a,b)=>(a.fechaCreacion||'').localeCompare(b.fechaCreacion||''));
    const regSaldo = regMovs.length ? Number(regMovs[regMovs.length-1].saldoResultante)||0 : 0;
    const regGen = regMovs.filter(m=>Number(m.dias)>0).reduce((s,m)=>s+Number(m.dias),0);
    const estudio = Object.keys(data.estudio).sort().map(yr=>{
      const yMovs = data.estudio[yr].sort((a,b)=>(a.fechaCreacion||'').localeCompare(b.fechaCreacion||''));
      return {año:yr, saldo:Number(yMovs[yMovs.length-1].saldoResultante)||0, generada:yMovs.filter(m=>Number(m.dias)>0).reduce((s,m)=>s+Number(m.dias),0), movimientos:yMovs};
    });
    const ingreso = regMovs[0]?.ingreso||'';
    return {id:e.id, nombre:e.nombre, ingreso, reglamentaria:{saldo:regSaldo,generada:regGen,movimientos:regMovs}, estudio};
  });
}

function licColorPorNombre(nombre) {
  const cols=['#6366F1','#F43F5E','#F59E0B','#10B981','#8B5CF6','#EC4899','#0EA5E9','#14B8A6','#F97316','#64748B','#A855F7'];
  let h=0; for(let i=0;i<nombre.length;i++) h=nombre.charCodeAt(i)+((h<<5)-h);
  return cols[Math.abs(h)%cols.length];
}

function fechaAMesPlan(fecha) {
  if(!fecha) return '';
  const mC=['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const p=fecha.split('/');
  if(p.length<3) return '';
  const m=parseInt(p[1]), y=p[2].length===4?p[2]:'20'+p[2];
  return m>=1&&m<=12?mC[m]+' '+y:'';
}

function getMesesPlan(n) {
  const hoy = new Date();
  const meses = [];
  for(let i=0; i<n; i++) {

function aprobarSolicitud(s) {
  if(!confirm('¿Aprobar solicitud de '+s.empleadoNombre+'?\n'+s.fechaDesde+(s.fechaHasta&&s.fechaHasta!==s.fechaDesde?' → '+s.fechaHasta:'')+(s.dias?'\nDías: '+s.dias:''))) return;
  
  s.estado='aprobada';
  apiPost({action:'update',sheet:'LicSolicitudes',id:s.id,data:{estado:'aprobada'}});
  
  // Calcular nuevo saldo
  const movs=(state.data.licencias||[]).filter(m=>m.empleadoId===s.empleadoId&&m.tipo===s.tipo);
  const saldoActual=movs.length?Number(movs[movs.length-1].saldoResultante)||0:0;
  const dias=Number(s.dias)||0;
  const nuevoSaldo=saldoActual-dias;
  
  // Registrar movimiento en Licencias
  const mov={
    id:'lic'+Date.now(),
    empleadoId:s.empleadoId,
    tipo:s.tipo,
    año:s.año||String(new Date().getFullYear()),
    descripcion:'Licencia Gozada',
    fecha:s.fechaDesde+(s.fechaHasta&&s.fechaHasta!==s.fechaDesde?' - '+s.fechaHasta:''),
    dias:String(-dias),
    saldoResultante:String(nuevoSaldo),
    ingreso:'',
    fechaCreacion:new Date().toISOString().slice(0,10)
  };
  if(!state.data.licencias) state.data.licencias=[];
  state.data.licencias.push(mov);
  apiPost({action:'add',sheet:'Licencias',data:mov});
  
  // Agregar a planificación
  if(!state.data.licPlanificacion) state.data.licPlanificacion=[];
  const mesPlan=fechaAMesPlan(s.fechaDesde);
  if(mesPlan) {
    const diaDesde=(s.fechaDesde||'').split('/')[0]||'1';
    const diaHasta=(s.fechaHasta&&s.fechaHasta!==s.fechaDesde?s.fechaHasta:s.fechaDesde||'').split('/')[0]||diaDesde;
    const p={
      id:'lp'+Date.now(),
      nombre:s.empleadoNombre,
      color:licColorPorNombre(s.empleadoNombre||''),
      mes:mesPlan,
      desde:diaDesde,
      hasta:diaHasta
    };
    state.data.licPlanificacion.push(p);
    apiPost({action:'add',sheet:'LicPlanificacion',data:p});
  }
  
  render();
  showNotif('✅ Aprobada. Nuevo saldo de '+s.empleadoNombre+': <b>'+nuevoSaldo+' días</b>');
}

// ── MODALES ───────────────────────────────────
function renderModalLicSolicitud(app) {
  const myId=myEmpleadoId();
  const empleados=state.data.empleados||[];
  const fTipo=makeFormField('Tipo','select',{selected:'reglamentaria',options:[{value:'reglamentaria',label:'🏖️ Reglamentaria'},{value:'estudio',label:'📚 Por Estudio'}]});
  const fAño=makeFormField('Año','text',String(new Date().getFullYear()),'');
  const fDesde=makeFormField('Fecha desde','text','','dd/mm/aaaa');
  const fHasta=makeFormField('Fecha hasta','text','','dd/mm/aaaa — mismo día si es uno solo');

  const saldoDiv=el('div',{style:{background:'#EEF2FF',borderRadius:'8px',padding:'10px 14px',fontSize:'13px',color:'#4F46E5',marginBottom:'4px',fontWeight:600}},'Saldo disponible: —');
  const updSaldo=()=>{
    const movs=(state.data.licencias||[]).filter(m=>m.empleadoId===myId&&m.tipo===fTipo._input.value);
    const s=movs.length?Number(movs[movs.length-1].saldoResultante)||0:0;
    saldoDiv.textContent='Saldo disponible: '+s+' días'+(s<=0?' ⚠️ Sin saldo':'');
    saldoDiv.style.background=s>0?'#EEF2FF':'#FEF2F2';
    saldoDiv.style.color=s>0?'#4F46E5':'#DC2626';
  };
  fTipo._input.addEventListener('change',updSaldo);
  setTimeout(updSaldo,100);

  const btns=el('div',{style:{display:'flex',gap:'10px',justifyContent:'flex-end'}},
    el('button',{className:'btn btn-secondary',onClick:()=>{state.modals.licSolic=null;render();}},'Cancelar'),
    el('button',{className:'btn btn-primary',onClick:()=>{
      const tipo=fTipo._input.value,año=fAño._input.value.trim(),desde=fDesde._input.value.trim(),hasta=fHasta._input.value.trim()||desde;
      if(!desde){alert('Ingresá la fecha desde');return;}
      let dias=1;
      try{const[d1,m1,y1]=desde.split('/').map(Number);const[d2,m2,y2]=hasta.split('/').map(Number);dias=Math.max(1,Math.round((new Date(y2,m2-1,d2)-new Date(y1,m1-1,d1))/(864e5))+1);}catch(e){}
      const emp=empleados.find(e=>e.id===myId);
      const sol={id:'sol'+Date.now(),empleadoId:myId,empleadoNombre:emp?emp.nombre:myId,tipo,año,fechaDesde:desde,fechaHasta:hasta,dias:String(dias),estado:'pendiente',motivoRechazo:'',fechaCreacion:new Date().toISOString().slice(0,10)};
      if(!state.data.licSolicitudes)state.data.licSolicitudes=[];
      state.data.licSolicitudes.push(sol);
      apiPost({action:'add',sheet:'LicSolicitudes',data:sol});
      state.modals.licSolic=null;state.licTab='solicitudes';render();
      showNotif('📋 Solicitud enviada, quedá pendiente de aprobación.');
    }},'📋 Enviar solicitud')
  );
  makeModal('🏖️ Solicitar licencia',[saldoDiv,fTipo,fAño,fDesde,fHasta,btns],app);
}

    el('button',{className:'btn btn-secondary',onClick:()=>{state.modals.agregarDias=null;render();}},'Cancelar'),
    el('button',{className:'btn btn-primary',onClick:()=>{
      const empId=fEmp._input.value, tipo=fTipo._input.value, año=fAño._input.value.trim(), diasStr=fDias._input.value.trim();
      if(!empId||!diasStr){alert('Completá empleado y días');return;}

      const saldo=movs.length?Number(movs[movs.length-1].saldoResultante)||0:0;
      const nuevoSaldo=saldo+dias;

      state.data.licencias.push(mov);
      apiPost({action:'add',sheet:'Licencias',data:mov});
      state.modals.agregarDias=null;state.licTab='saldos';render();
      showNotif('✅ '+dias+' días acreditados. Nuevo saldo: <b>'+nuevoSaldo+' días</b>');
    }},'✅ Acreditar días')
  );
  makeModal('➕ Agregar días disponibles',[saldoDiv,fEmp,fTipo,fAño,fDias,btns],app);
}
