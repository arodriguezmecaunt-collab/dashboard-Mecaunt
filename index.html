<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#F1F5F9;min-height:100vh}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
.sidebar{width:230px;background:#0F172A;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;z-index:100}
.main{margin-left:230px;min-height:100vh}
.content{max-width:1200px;margin:0 auto;padding:32px 28px}
.nav-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 14px;border:none;border-radius:10px;margin-bottom:2px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;background:transparent;color:#94A3B8}
.nav-btn.active{background:#1E293B;color:#fff}
.card{background:#fff;border-radius:14px;border:1px solid #E2E8F0;padding:18px;position:relative;overflow:hidden}
.stat-bar{position:absolute;top:0;left:0;right:0;height:3px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border:none;border-radius:10px;font-size:14px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap}
.btn-primary{background:#4F46E5;color:#fff}.btn-primary:hover{background:#4338CA}
.btn-secondary{background:#F1F5F9;color:#334155;border:1px solid #E2E8F0}.btn-secondary:hover{background:#E2E8F0}
.btn-danger{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA}.btn-danger:hover{background:#FECACA}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;font-family:'DM Mono',monospace}
.input{width:100%;padding:10px 14px;border:2px solid #E2E8F0;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#FAFBFC;box-sizing:border-box}
.input:focus{border-color:#818CF8}
.select{width:100%;padding:10px 14px;border:2px solid #E2E8F0;border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;background:#FAFBFC;cursor:pointer;box-sizing:border-box}
.filter-select{padding:8px 14px;border:2px solid #E2E8F0;border-radius:8px;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;background:#fff;cursor:pointer;color:#334155}
.org-btn{padding:8px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;text-transform:uppercase}
.modal-overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-bg{position:absolute;inset:0;background:rgba(15,23,42,0.6);backdrop-filter:blur(4px)}
.modal{position:relative;background:#fff;border-radius:16px;width:480px;max-width:95vw;max-height:85vh;overflow:auto;box-shadow:0 25px 50px -12px rgba(0,0,0,.25)}
.table{width:100%;border-collapse:collapse;font-family:'DM Sans',sans-serif}
.table th{padding:12px 16px;text-align:left;font-size:11px;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid #E2E8F0;white-space:nowrap;background:#F8FAFC}
.table td{padding:10px 16px;font-size:13px;border-bottom:1px solid #F1F5F9}
.tarea-card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;padding:16px 20px;transition:all 0.15s}
.tarea-card.overdue{border:2px solid #FECACA}
.tarea-card.done{opacity:0.65}
.check-btn{width:22px;height:22px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0}
.search-box{position:relative;flex:1 1 220px;max-width:320px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#94A3B8}
.search-input{width:100%;padding:10px 14px 10px 38px;border:2px solid #E2E8F0;border-radius:10px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;background:#fff}
.empresa-card{background:#fff;border-radius:12px;border:1px solid #E2E8F0;padding:16px;cursor:pointer;transition:border-color 0.15s}
.empresa-card:hover{border-color:#818CF8}
.enc-select{padding:4px 6px;border:1px solid #E2E8F0;border-radius:6px;font-size:11px;font-family:'DM Sans',sans-serif;cursor:pointer;max-width:110px}
.trash-btn{background:none;border:none;color:#CBD5E1;cursor:pointer;padding:4px;border-radius:4px}
.trash-btn:hover{color:#EF4444}
.error-bar{position:fixed;top:12px;right:12px;z-index:2000;background:#FEF2F2;border:1px solid #FECACA;border-radius:10px;padding:10px 16px;font-size:13px;color:#DC2626;max-width:350px;display:flex;align-items:center;gap:8px}
.notif-bar{position:fixed;top:12px;right:12px;z-index:2001;background:#EEF2FF;border:1px solid #C7D2FE;border-radius:10px;padding:12px 16px;font-size:13px;color:#4F46E5;max-width:380px;box-shadow:0 10px 25px -5px rgba(0,0,0,.1);animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-100%)}to{transform:translateX(0)}}
.mobile-header{display:none;align-items:center;justify-content:space-between;padding:12px 16px;background:#0F172A;position:sticky;top:0;z-index:99}
.hamburger{background:none;border:none;color:#fff;font-size:24px;cursor:pointer;padding:4px 8px}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
.sidebar-overlay.open{display:block}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .3s ease;z-index:200}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0}
  .mobile-header{display:flex!important}
  .content{padding:16px 12px!important}
  .btn{padding:10px 16px!important;font-size:13px!important}
  .check-btn{width:28px!important;height:28px!important}
  .tarea-card{padding:14px!important}
  .filter-select,.search-input,.input,.select{font-size:14px!important;padding:10px 12px!important}
  table{font-size:12px}
  table th,table td{padding:8px 10px!important}
  .stat-card{padding:14px!important}
  h2{font-size:22px!important}
}
</style>
</head>

// API
async function apiGet(url, code) {
  const c = code || state.accessCode;
  const r = await fetch(url+'?action=getAll&code='+encodeURIComponent(c));
  if(!r.ok) throw new Error('HTTP '+r.status);
  const d = await r.json();
  if(d.error) throw new Error(d.error);
  d.empresas = (d.empresas||[]).map(e=>{
    const clean = v => (!v || v==='None' || v==='undefined') ? '' : String(v);
    return {...e, clave_bps:clean(e.clave_bps), clave_dgi:clean(e.clave_dgi), clave_anv:clean(e.clave_anv), notas:clean(e.notas), fecha_bce:clean(e.fecha_bce), carpeta:clean(e.carpeta), categoria:clean(e.categoria), categoria2:clean(e.categoria2), claves:{bps:clean(e.clave_bps),dgi:clean(e.clave_dgi),anv:clean(e.clave_anv)}, documentos:[]};
  });
  d.horasTrabajadas = (d.horasTrabajadas||[]).map(h=>({...h, horas:Number(h.horas)||0}));
  // Deduplicar por id para evitar filas repetidas del sheet
  const uniq = (arr) => { const seen=new Set(); return (arr||[]).filter(x=>x.id&&!seen.has(x.id)&&seen.add(x.id)); };
  d.tareas = uniq(d.tareas);
  d.vencimientos = uniq(d.vencimientos);
  d.empleados = uniq(d.empleados).length ? uniq(d.empleados) : [{id:'e1',nombre:'Admin',color:'#3B82F6'}];
  d.ausencias = uniq(d.ausencias);
  d.plantillas = (d.plantillas||[]).map(p=>({...p, dia:Number(p.dia)||1}));
  d.accesos = d.accesos||[];
  d.documentos = d.documentos||[];
  d.comentarios = d.comentarios||[];
  d.categoriasEmp = d.categoriasEmp||[];
  // Licencias: si el Apps Script viejo no las devuelve, las buscamos por separado
  d.licencias = uniq(d.licencias);
  d.licPlanificacion = uniq(d.licPlanificacion||[]);
  d.licRestringidos = uniq(d.licRestringidos||[]);
  d.licSolicitudes = uniq(d.licSolicitudes||[]);
  d.licPlanificacion = uniq(d.licPlanificacion);
  d.licRestringidos = uniq(d.licRestringidos);
  state.isAdmin = d._isAdmin || false;
  state.accessName = d._userName || state.accessName || '';
  return d;
}

const mesNum = {'enero':1,'febrero':2,'marzo':3,'abril':4,'mayo':5,'junio':6,'julio':7,'agosto':8,'septiembre':9,'setiembre':9,'octubre':10,'noviembre':11,'diciembre':12};

// DGI 2026 vencimientos reales (dia del mes por mes 1-12)
const dgiCede2026   = [0,22,23,23,22,22,22,22,24,22,22,23,22];
const dgiNoCede2026 = [0,26,25,25,27,25,25,27,26,25,26,25,28];

// Auto-generate vencimientos for a given month from plantillas + DJ from fecha_bce
async function autoGenerate(year, month) {
  const prefix = year+'-'+pad2(month);
  const existing = state.data.vencimientos.filter(v=>(v.venc||'').startsWith(prefix));
  const newVencs = [];

  // 1. Generate from plantillas (por plantilla individual, para poder completar meses parciales)
  const plantillas = state.data.plantillas||[];
  const maxDay = lastDay(year, month);
  plantillas.forEach(p => {
    // Mensual: genera todos los meses. Anual: solo genera en el mes indicado
    const freq = p.frecuencia || 'mensual';
    if(freq === 'anual') {
      const mesPl = Number(p.mes)||0;
      if(mesPl !== month) return; // solo en el mes correcto
    }
    const dia = Math.min(Number(p.dia)||1, maxDay);
    const fechaVenc = prefix+'-'+pad2(dia);
    // Chequear si ya existe un vencimiento para esta plantilla en este mes
    const yaExiste = existing.some(v =>
      String(v.empresaId) === String(p.empresaId) &&
      String(v.org) === String(p.org) &&
      (v.obligacion||'').trim().toUpperCase() === (p.obligacion||'').trim().toUpperCase() &&
      (v.venc||'').startsWith(prefix)
    );
    if(yaExiste) return;
    newVencs.push({id:'v'+Date.now()+Math.random().toString(36).slice(2,6), empresaId:p.empresaId, venc:fechaVenc, org:p.org, obligacion:p.obligacion, estado:'pendiente', encargadoId:p.encargadoId||'', encargadoId2:p.encargadoId2||'', tick1:'', tick2:''});
  });

  // 2. Generate DJ tasks from fecha_bce
  // DJ vence 4 meses despues del balance, se genera 1 mes antes para avisar
  const allVencs = [...state.data.vencimientos, ...newVencs];
  (state.data.empresas||[]).forEach(emp => {
    if(!emp.fecha_bce) return;
    const bceMonth = mesNum[(emp.fecha_bce||'').toLowerCase().trim()];
    if(!bceMonth) return;
    // DJ month = balance + 4
    let djMonth = bceMonth + 4;
    if(djMonth > 12) djMonth -= 12;
    // Generate 1 month before (alertMonth = djMonth - 1)
    let alertMonth = djMonth - 1;
    if(alertMonth < 1) alertMonth = 12;
    // Only generate when navigating to the alert month
    if(alertMonth !== month) return;
    // DJ year: if djMonth wraps into next year
    let djYear = year;
    if(djMonth < alertMonth) djYear = year + 1;
    const djPrefix = djYear+'-'+pad2(djMonth);
    // Check if DJ already exists
    const djExists = allVencs.some(v => v.empresaId === emp.id && ((v.obligacion||'').includes('DJ '+emp.nombre)) && ((v.venc||'').startsWith(djPrefix) || (v.venc||'').startsWith(prefix)));
    if(djExists) return;
    // Real DGI date in DJ month
    const isCede = (emp.categoria||'')==='cede' || (emp.categoria2||'')==='cede';
    const dgiDates = isCede ? dgiCede2026 : dgiNoCede2026;
    const dia = dgiDates[djMonth] || 25;
    // 1. Alert task visible THIS month (last day of alert month)
    const alertDia = lastDay(year, alertMonth);
    newVencs.push({id:'vdja'+Date.now()+Math.random().toString(36).slice(2,6), empresaId:emp.id, venc:prefix+'-'+pad2(alertDia), org:'DGI', obligacion:'\u26a0 Preparar DJ '+emp.nombre+' (vence '+pad2(dia)+'/'+pad2(djMonth)+')', estado:'pendiente', encargadoId:'', encargadoId2:'', tick1:'', tick2:''});
    // 2. DJ vencimiento real in DJ month
    newVencs.push({id:'vdj'+Date.now()+Math.random().toString(36).slice(2,6), empresaId:emp.id, venc:djPrefix+'-'+pad2(dia), org:'DGI', obligacion:'Vencimiento DJ '+emp.nombre, estado:'pendiente', encargadoId:'', encargadoId2:'', tick1:'', tick2:''});
  });

  if(!newVencs.length) return;
  state.data.vencimientos.push(...newVencs);
  render();
  // Save in background without blocking
  (async()=>{
    for(const v of newVencs) {
      await apiPost({action:'add',sheet:'Vencimientos',data:v});
    }
  })();
}

let lastWriteTime = 0;

async function apiPost(payload) {
  if(!state.apiUrl) return;
  try {
    lastWriteTime = Date.now();
    payload._code = state.accessCode;
    const encoded = encodeURIComponent(JSON.stringify(payload));
    const url = state.apiUrl + '?write=1&payload=' + encoded;
    const resp = await fetch(url, {method:'GET', redirect:'follow'});
    const text = await resp.text();
    try {
      const result = JSON.parse(text);
      if(result.error) {
        console.error('apiPost error:', result.error, payload);
        state.error = '❌ '+( payload.sheet||'?')+': '+result.error;
        render();
      } else {
        console.log('✅ apiPost OK:', payload.action, payload.sheet, payload.id||payload.data?.id, result);
      }
    } catch(e) { /* non-JSON response, ignore */ }
  } catch(e) { 
    console.error('apiPost catch:', e);
    state.error = '❌ Error de red: '+e.message; render(); 
  }
}

async function uploadFile(file, empresaId, empresaNombre) {
  if(!state.apiUrl||!file) return null;
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = async function() {
      const base64 = reader.result.split(',')[1];
      try {
        const r = await fetch(state.apiUrl, {method:'POST', body:JSON.stringify({action:'uploadFile',_code:state.accessCode,fileName:file.name,mimeType:file.type,fileData:base64,empresaId,empresaNombre})});
        const d = await r.json();
        if(d.error) throw new Error(d.error);
        if(d.doc) { if(!state.data.documentos) state.data.documentos=[]; state.data.documentos.push(d.doc); }
        resolve(d);
      } catch(e) { state.error='Error subiendo: '+e.message; render(); reject(e); }
    };
    reader.readAsDataURL(file);
  });
}

async function connect(url, code) {
  state.loading = true; state.error = ''; render();
  try {
    state.accessCode = code || state.accessCode;
    const d = await apiGet(url, code);
    state.data = d; state.apiUrl = url;
    localStorage.setItem('estudio-api-url', url);
    localStorage.setItem('estudio-access-code', state.accessCode);
    localStorage.setItem('estudio-access-name', state.accessName);
    state.lastSync = new Date(); state.modals = {};
    // Auto-generate vencimientos for current month on login
    const now = new Date();
    autoGenerate(now.getFullYear(), now.getMonth()+1);
    // Si el Apps Script es viejo y no devuelve licencias, las buscamos por separado
    if(!d.licencias || d.licencias.length === 0) fetchLicenciasSheets();
  } catch(e) { state.error = 'Error: '+e.message; }
  state.loading = false; render();
}

async function fetchLicenciasSheets() {
  if(!state.apiUrl) return;
  try {
    const sheets = ['Licencias','LicPlanificacion','LicRestringidos','LicSolicitudes'];
    for(const s of sheets) {
      const r = await fetch(state.apiUrl+'?action=getSheet&sheet='+s+'&code='+encodeURIComponent(state.accessCode));
      if(!r.ok) continue;
      const data = await r.json();
      if(Array.isArray(data)) {
        const uniq = (arr) => { const seen=new Set(); return (arr||[]).filter(x=>x.id&&!seen.has(x.id)&&seen.add(x.id)); };
        if(s==='Licencias') state.data.licencias = uniq(data);
        if(s==='LicPlanificacion') state.data.licPlanificacion = uniq(data);
        if(s==='LicRestringidos') state.data.licRestringidos = uniq(data);
        if(s==='LicSolicitudes') state.data.licSolicitudes = uniq(data);
      }
    }
    render();
  } catch(e) { /* silent */ }
}

async function refresh() {
  if(!state.apiUrl) return;
  state.syncing = true; render();
  try {
    const d = await apiGet(state.apiUrl);
    state.data = d; state.lastSync = new Date(); state.error = '';
    state.isAdmin = d._isAdmin || false;
    if(d._userName) state.accessName = d._userName;
  } catch(e) { 
    if(e.message.includes('acceso')) { state.apiUrl=''; state.accessCode=''; localStorage.removeItem('estudio-api-url'); localStorage.removeItem('estudio-access-code'); }
    state.error = 'Error: '+e.message; 
  }
  state.syncing = false; render();
}

// Find current user's empleado ID
function myEmpleadoId() {
  const name = (state.accessName||'').toLowerCase().trim();
  if(!name) return null;
  // First try by empleadoId in accesos
  const acceso = (state.data.accesos||[]).find(a=>(a.nombre||'').toLowerCase().trim()===name && a.empleadoId);
  if(acceso) return acceso.empleadoId;
  // Fallback: match by name
  const emp = state.data.empleados.find(e=>(e.nombre||'').toLowerCase().trim()===name);
  return emp ? emp.id : null;
}

// Silent auto-refresh (no spinner, detects new assignments)
async function silentRefresh() {
  if(!state.apiUrl) return;
  // Skip if modal is open
  if(Object.keys(state.modals).some(k=>state.modals[k])) return;
  // Skip if there was a write in the last 30 seconds
  if(Date.now() - lastWriteTime < 30000) return;
  const myId = myEmpleadoId();
  const oldTareaIds = new Set((state.data.tareas||[]).map(t=>t.id));
  const oldAusIds = new Set((state.data.ausencias||[]).map(a=>a.id));
  try {
    const d = await apiGet(state.apiUrl);
    // Detect new items assigned to me
    if(myId) {
      const newTareas = (d.tareas||[]).filter(t=>!oldTareaIds.has(t.id) && (t.encargadoId===myId||t.encargadoId2===myId));
      newTareas.forEach(t=>showNotif('Nueva tarea: <b>'+t.titulo+'</b>'));
    }
    // Detect new ausencias (for admin)
    if(state.isAdmin) {
      const newAus = (d.ausencias||[]).filter(a=>!oldAusIds.has(a.id));
      newAus.forEach(a=>showNotif('Ausencia: <b>'+a.nombre+'</b> - '+a.motivo));
    }
    state.data = d; state.lastSync = new Date(); state.error = ''; state.syncError = null;
    render();
  } catch(e) { state.syncError = new Date(); render(); }
}

  else if(state.section==='plantillas') renderPlantillas(content);
  else if(state.section==='empresas') renderEmpresas(content);
  else if(state.section==='horas') renderHoras(content);
  else if(state.section==='equipo') renderEquipo(content);

  else if(state.section==='ausencias') renderAusencias(content);
  else if(state.section==='licencias') renderLicencias(content);

  // Modals
  if(state.modals.addVenc) renderModalVenc(app);
  if(state.modals.addPlant) renderModalPlantilla(app);
  if(state.modals.addEmp) renderModalEmpresa(app);
  if(state.modals.addEmpl) renderModalEmpleado(app);

  if(state.modals.addTarea) renderModalTarea(app);
  if(state.modals.addAcceso) renderModalAcceso(app);
  if(state.modals.addAusencia) renderModalAusencia(app);
  if(state.modals.completar) renderModalCompletar(app);

  if(state.modals.config) renderConfigModal(app);

  // Restore focus
  if(focusId) {
    const focusEl = document.querySelector('[data-fid="'+focusId+'"]');
    if(focusEl) { focusEl.focus(); if(cursorPos !== undefined) try { focusEl.setSelectionRange(cursorPos, cursorPos); } catch(e){} }
  }
}

function renderHome(c) {
  const D = state.data;
  const hoy = todayStr;
  const manana = new Date(new Date().getTime()+86400000).toISOString().split('T')[0];
  const empDepto = id => (D.empleados.find(e=>e.id===id)||{}).departamento||'';
  const myDept = myDepto();
  const forcedDept = (!state.isAdmin && myDept) ? myDept : null;
  const matchDept = v => {
    if(!forcedDept) return true;
    const d1=empDepto(v.encargadoId), d2=empDepto(v.encargadoId2);
    return d1===myDept || d2===myDept;
  };

  // Filter: only my own tasks/vencimientos
  const myId = myEmpleadoId();
  const matchMe = v => myId ? ((v.encargadoId||'')===myId || (v.encargadoId2||'')===myId) : true;

  // Vencimientos hoy/manana (filtered by dept + mine)
  const vHoy = D.vencimientos.filter(v=>v.venc===hoy&&v.estado!=='completado'&&matchDept(v)&&matchMe(v));
  const vManana = D.vencimientos.filter(v=>v.venc===manana&&v.estado!=='completado'&&matchDept(v)&&matchMe(v));
  const vVencidos = D.vencimientos.filter(v=>v.estado!=='completado'&&daysUntil(v.venc)<0&&matchDept(v)&&matchMe(v));
  const vProx7 = D.vencimientos.filter(v=>v.estado!=='completado'&&daysUntil(v.venc)>=0&&daysUntil(v.venc)<=7&&matchDept(v)&&matchMe(v));

  // Tareas urgentes (filtered by dept + mine)
  const tUrgentes = D.tareas.filter(t=>t.estado!=='completada'&&(t.prioridad==='alta'||(t.fechaLimite&&daysUntil(t.fechaLimite)<=3&&daysUntil(t.fechaLimite)>=0))&&matchDept(t)&&matchMe(t));
  const tVencidas = D.tareas.filter(t=>t.estado!=='completada'&&t.fechaLimite&&daysUntil(t.fechaLimite)<0&&matchDept(t)&&matchMe(t));

  // Ausencias hoy

    el('p',{style:{marginTop:'6px',fontSize:'14px',color:'#94A3B8'}},meses[new Date().getMonth()+1]+' '+new Date().getDate()+', '+new Date().getFullYear()+(state.lastSync?' \u00b7 Sync '+state.lastSync.toLocaleTimeString():''))

  // Tareas urgentes
  const cardTareas = el('div',{style:{background:'#fff',borderRadius:'16px',border:'1px solid #E2E8F0',padding:'24px',overflow:'hidden',position:'relative'}});

    cardAus.append(el('div',{style:{position:'absolute',top:0,left:0,right:0,height:'3px',background:'#7C3AED'}}));
    cardAus.append(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}},
      el('h3',{style:{fontSize:'15px',fontWeight:700,color:'#0F172A'}},'Ausencias hoy ('+ausHoy.length+')'),
      el('button',{onClick:()=>{state.section='ausencias';render()},style:{background:'none',border:'none',color:'#4F46E5',fontSize:'12px',fontWeight:600,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}},'Ver todas \u2192')

// ===== DASHBOARD =====
function renderRecurrentes(c) {
  const D = state.data;
  const Y = state.viewYear, M = state.viewMonth;
  const prefix = Y+'-'+pad2(M);
  const monthVenc = D.vencimientos.filter(v=>(v.venc||'').startsWith(prefix));
  const pend = monthVenc.filter(v=>v.estado!=='completado');
  const vencidos = pend.filter(v=>daysUntil(v.venc)<0);
  const prox = pend.filter(v=>{const d=daysUntil(v.venc);return d>=0&&d<=7});
  const comp = monthVenc.filter(v=>v.estado==='completado');

  const prevMonth = async () => { let m=M-1,y=Y; if(m<1){m=12;y--} state.viewMonth=m;state.viewYear=y; await autoGenerate(y,m); render(); };
  const nextMonth = async () => { let m=M+1,y=Y; if(m>12){m=1;y++} state.viewMonth=m;state.viewYear=y; await autoGenerate(y,m); render(); };
  const isCurrentMonth = M===new Date().getMonth()+1 && Y===new Date().getFullYear();

  c.append(makeHeader('Recurrentes',
    (state.data.plantillas||[]).length+' plantillas \u00b7 '+(state.lastSync?' Sync '+state.lastSync.toLocaleTimeString():''),
    [
      el('button',{className:'btn btn-secondary',onClick:refresh},state.syncing?'Sincronizando...':'\u21bb Actualizar'),
      el('button',{className:'btn btn-secondary',onClick:()=>exportXls(monthVenc.filter(v=>v.estado!=='completado').sort((a,b)=>(a.venc||'').localeCompare(b.venc||'')).map(v=>[fmt(v.venc),empName(v.empresaId),v.org,v.obligacion,D.empleados.find(e=>e.id===v.encargadoId)?.nombre||'Sin asignar',D.empleados.find(e=>e.id===v.encargadoId2)?.nombre||'',daysUntil(v.venc)<0?'Vencido':'Pendiente',daysUntil(v.venc)]),['Fecha','Empresa','Org','Obligacion','Encargado 1','Encargado 2','Estado','Dias'],'recurrentes_'+prefix+'.xlsx')},'\u2b07 Exportar'),
      el('button',{className:'btn btn-primary',onClick:()=>{state.modals.addVenc=true;render()}},'\u002b Agregar')
    ]
  ));

  // Month navigator
  const monthNav = el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'16px',marginBottom:'24px',background:'#fff',borderRadius:'14px',border:'1px solid #E2E8F0',padding:'14px 24px'}});
  monthNav.append(
    el('button',{onClick:prevMonth,style:{background:'none',border:'1px solid #E2E8F0',borderRadius:'8px',width:'36px',height:'36px',cursor:'pointer',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center',color:'#64748B'}},'\u25c0'),
    el('div',{style:{textAlign:'center',minWidth:'200px'}},
      el('h3',{style:{margin:0,fontSize:'20px',fontWeight:800,color:'#0F172A'}},meses[M]+' '+Y),
      el('p',{style:{margin:'2px 0 0',fontSize:'12px',color:isCurrentMonth?'#059669':'#94A3B8',fontWeight:isCurrentMonth?600:400}},isCurrentMonth?'\u25cf Mes actual':'')
    ),
    el('button',{onClick:nextMonth,style:{background:'none',border:'1px solid #E2E8F0',borderRadius:'8px',width:'36px',height:'36px',cursor:'pointer',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center',color:'#64748B'}},'\u25b6')
  );
  if(!isCurrentMonth) {
    monthNav.append(el('button',{onClick:()=>{state.viewMonth=new Date().getMonth()+1;state.viewYear=new Date().getFullYear();render()},className:'btn btn-secondary',style:{marginLeft:'8px',padding:'6px 14px',fontSize:'12px'}},'Hoy'));
  }
  c.append(monthNav);

  // Auto-gen hint
  if(monthVenc.length===0 && (state.data.plantillas||[]).length>0) {
    const hint=el('div',{style:{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'12px',padding:'16px 20px',marginBottom:'20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'10px'}},
      el('span',{style:{fontSize:'13px',color:'#92400E'}},'\u26a0 No hay obligaciones para '+meses[M]+'. '),
      el('button',{className:'btn btn-primary',style:{padding:'8px 16px',fontSize:'13px'},onClick:async()=>{await autoGenerate(Y,M);render();}},'Generar desde plantillas')
    );
    c.append(hint);
  }

  c.append(makeStats([{l:'Pendientes',v:pend.length,c:'#D97706'},{l:'Vencidos',v:vencidos.length,c:'#DC2626'},{l:'Proximos 7d',v:prox.length,c:'#EA580C'},{l:'Completados',v:comp.length,c:'#059669'}]));

  // Filters
  const searchInput = el('input',{className:'search-input',placeholder:'Buscar...',value:state.search,'data-fid':'search-dash'});
  searchInput.addEventListener('input',e=>{state.search=e.target.value;render()});

  const orgBtns = ['todos','BPS','DGI','ANV','CONTAB.','SUELDOS'].map(o=>{
    const b = el('button',{className:'org-btn',onClick:()=>{state.filters.org=o;render()}},o==='todos'?'Todos':o);
    b.style.border = state.filters.org===o?'2px solid #4F46E5':'2px solid #E2E8F0';
    b.style.background = state.filters.org===o?'#EEF2FF':'#fff';
    b.style.color = state.filters.org===o?'#4F46E5':'#64748B';
    return b;
  });

  const estadoSel = el('select',{className:'filter-select'});
  [{v:'todos',l:'Todos'},{v:'pendiente',l:'Pendientes'},{v:'completado',l:'Completados'},{v:'vencido',l:'Vencidos'}].forEach(o=>{
    const opt = el('option',{value:o.v},o.l); if(state.filters.estado===o.v) opt.selected=true; estadoSel.append(opt);
  });
  estadoSel.addEventListener('change',e=>{state.filters.estado=e.target.value;render()});

  const encSel = el('select',{className:'filter-select'});
  encSel.append(el('option',{value:'todos'},'Todos encargados'), el('option',{value:''},'Sin asignar'));
  D.empleados.forEach(e=>{const o=el('option',{value:e.id},e.nombre);if(state.filters.enc===e.id)o.selected=true;encSel.append(o)});
  if(state.filters.enc==='todos') encSel.value='todos';
  else if(state.filters.enc==='') encSel.value='';
  encSel.addEventListener('change',e=>{state.filters.enc=e.target.value;render()});

  c.append(el('div',{style:{display:'flex',flexWrap:'wrap',gap:'10px',marginBottom:'20px',alignItems:'center'}},
    el('div',{className:'search-box'}, el('span',{className:'search-icon',innerHTML:'&#128269;'}), searchInput),
    ...orgBtns, estadoSel, encSel
  ));

  // Filter vencimientos for this month
  const filtV = monthVenc.filter(v=>{
    const n=empName(v.empresaId).toLowerCase();
    if(state.search && !n.includes(state.search.toLowerCase()) && !(v.obligacion||'').toLowerCase().includes(state.search.toLowerCase())) return false;
    if(state.filters.org!=='todos' && v.org!==state.filters.org) return false;
    if(state.filters.estado==='pendiente' && v.estado==='completado') return false;
    if(state.filters.estado==='completado' && v.estado!=='completado') return false;
    if(state.filters.estado==='vencido' && (v.estado==='completado'||daysUntil(v.venc)>=0)) return false;
    if(state.filters.enc!=='todos' && (v.encargadoId||'')!==state.filters.enc && (v.encargadoId2||'')!==state.filters.enc) return false;
    return true;
  }).sort((a,b)=>(a.venc||'').localeCompare(b.venc||''));

  // Table
  const table = el('table',{className:'table'});
  const thead = el('thead',{},el('tr',{},
    ...['','Venc.','Empresa','Org.','Obligacion','Encargados','Estado',''].map(h=>el('th',{},h))
  ));
  table.append(thead);
  const tbody = el('tbody');
  filtV.slice(0,100).forEach(v=>{
    const sc = statusColor(v.venc,v.estado);
    const enc1 = D.empleados.find(e=>e.id===v.encargadoId);
    const enc2 = D.empleados.find(e=>e.id===v.encargadoId2);
    const has2 = !!v.encargadoId2;

    const updateVencEstado = (tickKey) => {
      const done = v[tickKey]==='true';
      if(done) {
        v[tickKey] = '';
        if(has2) { v.estado = (v.tick1==='true'&&v.tick2==='true')?'completado':'pendiente'; }
        else { v.estado = 'pendiente'; }
        apiPost({action:'update',sheet:'Vencimientos',id:v.id,data:{tick1:v.tick1||'',tick2:v.tick2||'',estado:v.estado}});render();
      } else {
        const encId = tickKey==='tick1'?v.encargadoId:v.encargadoId2;
        state.modals.completar = {type:'venc',item:v,tickKey,encargadoId:encId};
        render();
      }
    };

    const makeVCheck = (tickKey, encObj) => {
      const done = v[tickKey]==='true';
      const btn = el('button',{className:'check-btn',onClick:()=>{
        updateVencEstado(tickKey);
      }});
      btn.style.border = done?'none':'2px solid '+(encObj?.color||'#CBD5E1');
      btn.style.background = done?(encObj?.color||'#059669'):'#fff';
      btn.style.color = '#fff';
      if(done) btn.innerHTML = '\u2713';
      return btn;
    };

    const checksCell = el('div',{style:{display:'flex',gap:'4px',alignItems:'center'}});
    checksCell.append(makeVCheck('tick1', enc1));
    if(has2) checksCell.append(makeVCheck('tick2', enc2));

    // Encargado selects
    const encCell = el('div',{style:{display:'flex',flexDirection:'column',gap:'4px'}});
    const encSelect1 = el('select',{className:'enc-select'});
    encSelect1.style.background = v.encargadoId?'#EEF2FF':'#fff';
    encSelect1.style.color = v.encargadoId?'#4F46E5':'#94A3B8';
    encSelect1.append(el('option',{value:''},'\u2014'));
    D.empleados.forEach(e=>{const o=el('option',{value:e.id},e.nombre);if(v.encargadoId===e.id)o.selected=true;encSelect1.append(o)});
    encSelect1.addEventListener('change',e=>{v.encargadoId=e.target.value;apiPost({action:'update',sheet:'Vencimientos',id:v.id,data:{encargadoId:e.target.value}});render()});

    const encSelect2 = el('select',{className:'enc-select'});
    encSelect2.style.background = v.encargadoId2?'#FFF7ED':'#fff';
    encSelect2.style.color = v.encargadoId2?'#EA580C':'#CBD5E1';
    encSelect2.style.fontSize = '10px';
    encSelect2.append(el('option',{value:''},'+ 2do'));
    D.empleados.forEach(e=>{const o=el('option',{value:e.id},e.nombre);if(v.encargadoId2===e.id)o.selected=true;encSelect2.append(o)});
    encSelect2.addEventListener('change',e=>{v.encargadoId2=e.target.value;v.tick2='';apiPost({action:'update',sheet:'Vencimientos',id:v.id,data:{encargadoId2:e.target.value,tick2:''}});render()});

    encCell.append(encSelect1, encSelect2);

    const orgSpan = el('span',{style:{padding:'3px 8px',borderRadius:'5px',fontSize:'11px',fontWeight:700}},v.org);
    orgSpan.style.background = orgC(v.org).bg;
    orgSpan.style.color = orgC(v.org).text;

    const badge = el('span',{className:'badge'},sc.label);
    badge.style.background=sc.bg; badge.style.color=sc.text; badge.style.border='1px solid '+sc.border;
    const progressBadge = has2 ? el('span',{style:{fontSize:'9px',fontWeight:700,color:v.estado==='completado'?'#059669':'#D97706',marginLeft:'4px'}},
      (v.tick1==='true'?1:0)+(v.tick2==='true'?1:0)+'/2') : '';

    const delBtn = el('button',{className:'trash-btn',onClick:()=>{if(!confirm('Eliminar "'+v.obligacion+'"?'))return;state.data.vencimientos=state.data.vencimientos.filter(x=>x.id!==v.id);apiPost({action:'delete',sheet:'Vencimientos',id:v.id});render()},innerHTML:'\ud83d\uddd1'});

    tbody.append(el('tr',{},
      el('td',{style:{width:'50px',paddingLeft:'16px'}},checksCell),
      el('td',{style:{fontWeight:600,fontFamily:"'DM Mono',monospace",whiteSpace:'nowrap'}},fmt(v.venc)),
      el('td',{style:{fontWeight:600,color:'#0F172A',maxWidth:'220px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},empName(v.empresaId)),
      el('td',{},orgSpan),
      el('td',{style:{color:'#475569',maxWidth:'280px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},v.obligacion),
      el('td',{},encCell),
      el('td',{},el('div',{style:{display:'flex',alignItems:'center'}},badge,progressBadge)),
      el('td',{},delBtn)
    ));
  });
  table.append(tbody);
  const tableWrap = el('div',{style:{background:'#fff',borderRadius:'14px',border:'1px solid #E2E8F0',overflow:'hidden'}},el('div',{style:{overflowX:'auto'}},table));
  if(filtV.length===0 && monthVenc.length>0) tableWrap.append(el('div',{style:{padding:'48px',textAlign:'center',color:'#94A3B8',fontSize:'14px'}},'Sin resultados con estos filtros'));
  c.append(tableWrap);
}

// ===== CALENDARIO VISUAL =====
function renderCalendario(c) {
  const D = state.data;
  const Y = state.viewYear, M = state.viewMonth;
  const prefix = Y+'-'+pad2(M);
  const calF = state.filters.calEnc;
  const empDepto = id => (D.empleados.find(e=>e.id===id)||{}).departamento||'';
  const myDept = myDepto();
  const forcedDept = (!state.isAdmin && myDept) ? myDept : null;
  const matchEnc = v => calF==='todos' || (v.encargadoId||'')===calF || (v.encargadoId2||'')===calF;
  const matchDept = v => {
    if(!forcedDept) return true;
    const d1=empDepto(v.encargadoId), d2=empDepto(v.encargadoId2);
    return d1===myDept || d2===myDept;
  };
  const calQ = (state.filters.calSearch||'').toLowerCase();
  const matchSearch = v => !calQ || empName(v.empresaId).toLowerCase().includes(calQ) || (v.obligacion||'').toLowerCase().includes(calQ) || (v.titulo||'').toLowerCase().includes(calQ);
  const monthVenc = D.vencimientos.filter(v=>(v.venc||'').startsWith(prefix) && matchEnc(v) && matchDept(v) && matchSearch(v));
  const monthTareas = D.tareas.filter(t=>t.fechaLimite&&t.fechaLimite.startsWith(prefix)&&t.estado!=='completada' && matchEnc(t) && matchDept(t) && matchSearch(t));

  const prevMonth = () => { let m=M-1,y=Y; if(m<1){m=12;y--} state.viewMonth=m;state.viewYear=y;render(); };
  const nextMonth = () => { let m=M+1,y=Y; if(m>12){m=1;y++} state.viewMonth=m;state.viewYear=y;render(); };

  c.append(makeHeader('Calendario','Vencimientos y tareas del mes',[
    el('button',{className:'btn btn-secondary',onClick:()=>{state.section='tareas';render()}},'Vista tabla')
  ]));

  // Person filter
  const encSel = el('select',{className:'filter-select',style:{marginBottom:'8px'}});
  encSel.append(el('option',{value:'todos'},'Todos'));
  D.empleados.forEach(e=>{const o=el('option',{value:e.id},e.nombre);if(calF===e.id)o.selected=true;encSel.append(o)});
  encSel.addEventListener('change',e=>{state.filters.calEnc=e.target.value;render()});

  // Month navigator
  const monthNav = el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'16px',marginBottom:'16px'}});
  monthNav.append(
    el('button',{onClick:prevMonth,style:{background:'#fff',border:'1px solid #E2E8F0',borderRadius:'8px',width:'36px',height:'36px',cursor:'pointer',fontSize:'16px'},innerHTML:'&#9664;'}),
    el('h3',{style:{margin:0,fontSize:'22px',fontWeight:800,color:'#0F172A',minWidth:'200px',textAlign:'center'}},meses[M]+' '+Y),
    el('button',{onClick:nextMonth,style:{background:'#fff',border:'1px solid #E2E8F0',borderRadius:'8px',width:'36px',height:'36px',cursor:'pointer',fontSize:'16px'},innerHTML:'&#9654;'})
  );
  c.append(monthNav);

  // Search input
  const calSearchInp = el('input',{className:'search-input',placeholder:'Buscar empresa u obligacion...',value:state.filters.calSearch||'','data-fid':'cal-search',style:{maxWidth:'250px'}});
  calSearchInp.addEventListener('input',e=>{state.filters.calSearch=e.target.value;render()});

  // Filter bar
  c.append(el('div',{style:{display:'flex',alignItems:'center',gap:'12px',marginBottom:'20px',flexWrap:'wrap'}},
    el('div',{className:'search-box'},calSearchInp),
    el('span',{style:{fontSize:'12px',fontWeight:600,color:'#64748B'}},'Persona:'),
    encSel,
    el('span',{style:{fontSize:'12px',color:'#4F46E5',fontWeight:600}},monthVenc.length+' vencimientos \u00b7 '+monthTareas.length+' tareas')
  ));

  // Calendar grid
  const cal = el('div',{style:{background:'#fff',borderRadius:'16px',border:'1px solid #E2E8F0',overflow:'hidden'}});

  // Day headers
  const daysHeader = el('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',borderBottom:'1px solid #E2E8F0'}});
  ['Lun','Mar','Mie','Jue','Vie','Sab','Dom'].forEach(d=>{
    daysHeader.append(el('div',{style:{padding:'10px',textAlign:'center',fontSize:'11px',fontWeight:700,color:'#94A3B8',textTransform:'uppercase'}},d));
  });
  cal.append(daysHeader);

  // Calculate days
  const firstDay = new Date(Y, M-1, 1).getDay(); // 0=Sun
  const startOffset = firstDay===0?6:firstDay-1; // Mon=0
  const totalDays = lastDay(Y, M);
  const totalCells = Math.ceil((startOffset+totalDays)/7)*7;

  const grid = el('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)'}});

  for(let i=0; i<totalCells; i++) {
    const dayNum = i-startOffset+1;
    const isValidDay = dayNum>=1 && dayNum<=totalDays;
    const dateStr = isValidDay ? prefix+'-'+pad2(dayNum) : '';
    const isToday = dateStr===todayStr;
    const isWeekend = (i%7===5)||(i%7===6);

    const cell = el('div',{style:{minHeight:'90px',padding:'6px',borderRight:((i+1)%7!==0)?'1px solid #F1F5F9':'none',borderBottom:'1px solid #F1F5F9',background:isToday?'#EEF2FF':isWeekend&&isValidDay?'#FAFBFC':'#fff',opacity:isValidDay?1:0.3}});

    if(isValidDay) {
      // Day number
      const dayLabel = el('div',{style:{fontSize:'13px',fontWeight:isToday?800:600,color:isToday?'#4F46E5':'#0F172A',marginBottom:'4px',display:'flex',alignItems:'center',gap:'4px'}});
      if(isToday) {
        dayLabel.append(el('span',{style:{background:'#4F46E5',color:'#fff',borderRadius:'50%',width:'24px',height:'24px',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:'12px'}},String(dayNum)));
      } else {
        dayLabel.append(String(dayNum));
      }
      cell.append(dayLabel);

      // Vencimientos for this day
      const dayVenc = monthVenc.filter(v=>v.venc===dateStr);
      const dayTareas = monthTareas.filter(t=>t.fechaLimite===dateStr);

      dayVenc.slice(0,3).forEach(v=>{
        const done = v.estado==='completado';
        const pill = el('div',{style:{fontSize:'10px',padding:'2px 6px',borderRadius:'4px',marginBottom:'2px',background:done?'#ECFDF5':orgC(v.org).bg,color:done?'#059669':orgC(v.org).text,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',textDecoration:done?'line-through':'none',cursor:'pointer'},onClick:()=>{state.section='tareas';render()}});
        pill.textContent = v.org+' '+empName(v.empresaId).substring(0,15);
        cell.append(pill);
      });

      dayTareas.slice(0,2).forEach(t=>{
        const pill = el('div',{style:{fontSize:'10px',padding:'2px 6px',borderRadius:'4px',marginBottom:'2px',background:'#FFFBEB',color:'#D97706',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'pointer'},onClick:()=>{state.section='tareas';render()}});
        pill.textContent = '\u2611 '+t.titulo.substring(0,18);
        cell.append(pill);
      });

      const remaining = dayVenc.length-3+Math.max(0,dayTareas.length-2);
      if(remaining>0) cell.append(el('div',{style:{fontSize:'9px',color:'#94A3B8',fontWeight:600}},'+'+remaining+' mas'));
    }

    grid.append(cell);
  }
  cal.append(grid);
  c.append(cal);

  // Legend
  c.append(el('div',{style:{display:'flex',gap:'16px',marginTop:'16px',flexWrap:'wrap'}},
    el('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:'#64748B'}},el('span',{style:{width:'12px',height:'12px',borderRadius:'3px',background:'#DBEAFE'}}), 'BPS'),
    el('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:'#64748B'}},el('span',{style:{width:'12px',height:'12px',borderRadius:'3px',background:'#F3E8FF'}}), 'DGI'),
    el('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:'#64748B'}},el('span',{style:{width:'12px',height:'12px',borderRadius:'3px',background:'#FEF3C7'}}), 'ANV'),
    el('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:'#64748B'}},el('span',{style:{width:'12px',height:'12px',borderRadius:'3px',background:'#ECFDF5'}}), 'CONTAB.'),
    el('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:'#64748B'}},el('span',{style:{width:'12px',height:'12px',borderRadius:'3px',background:'#FFE4E6'}}), 'SUELDOS'),
    el('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:'#64748B'}},el('span',{style:{width:'12px',height:'12px',borderRadius:'3px',background:'#FFFBEB'}}), 'Tareas'),
    el('div',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'11px',color:'#64748B'}},el('span',{style:{width:'12px',height:'12px',borderRadius:'3px',background:'#ECFDF5',textDecoration:'line-through'}}), 'Completado')
  ));
}

// ===== TAREAS (unified: recurrentes + puntuales) =====
function renderTareas(c) {
  const D = state.data;
  const Y = state.viewYear, M = state.viewMonth;
  const prefix = Y+'-'+pad2(M);
  const tipo = state.filters.tareaTipo;

  // Build unified items
  const items = [];

  // Vencimientos (recurrentes) for current month
  if(tipo==='todos'||tipo==='recurrente') {
    const monthVenc = D.vencimientos.filter(v=>(v.venc||'').startsWith(prefix));
    monthVenc.forEach(v=>{
      items.push({_src:'venc',_id:v.id,_item:v,titulo:v.obligacion,empresaId:v.empresaId,encargadoId:v.encargadoId,encargadoId2:v.encargadoId2||'',fecha:v.venc,prioridad:'media',org:v.org,isDone:v.estado==='completado',tick1:v.tick1,tick2:v.tick2,cadenaDesc:'',cadenaPadreId:'',desc:''});
    });
  }

  // Tareas (puntuales)
  if(tipo==='todos'||tipo==='puntual') {
    (D.tareas||[]).forEach(t=>{
      items.push({_src:'tarea',_id:t.id,_item:t,titulo:t.titulo,empresaId:t.empresaId,encargadoId:t.encargadoId,encargadoId2:t.encargadoId2||'',fecha:t.fechaLimite,prioridad:t.prioridad||'media',org:'',isDone:t.estado==='completada',tick1:t.tick1,tick2:t.tick2,cadenaDesc:t.cadenaDesc||'',cadenaPadreId:t.cadenaPadreId||'',desc:t.descripcion||''});
    });
  }

  // Filter
  const empDepto = id => (D.empleados.find(e=>e.id===id)||{}).departamento||'';
  const myDept = myDepto();
  const deptFilter = state.filters.tareaDept;
  const forcedDept = (!state.isAdmin && myDept) ? myDept : null;
  const filtered = items.filter(it=>{
    const q = state.filters.tareaSearch.toLowerCase();
    if(q && !it.titulo.toLowerCase().includes(q) && !empName(it.empresaId).toLowerCase().includes(q)) return false;
    if(state.filters.tareaEst==='pendiente' && it.isDone) return false;
    if(state.filters.tareaEst==='completada' && !it.isDone) return false;
    if(state.filters.tareaEnc!=='todos' && (it.encargadoId||'')!==state.filters.tareaEnc && (it.encargadoId2||'')!==state.filters.tareaEnc) return false;
    if(state.filters.org!=='todos' && it._src==='venc' && it.org!==state.filters.org) return false;
    // Department restriction
    const d1=empDepto(it.encargadoId), d2=empDepto(it.encargadoId2);
    if(forcedDept) {
      // Non-admin: only see tasks where at least one encargado is from my dept
      if(deptFilter==='entre') { if(!d1||!d2||d1===d2) return false; if(d1!==myDept&&d2!==myDept) return false; }
      else { if(d1!==myDept && d2!==myDept) return false; }
    } else {
      // Admin: can filter freely
      if(deptFilter==='mio' && myDept) { if(d1!==myDept && d2!==myDept && d1!=='' && d2!=='') return false; }
      else if(deptFilter==='entre') { if(!d1||!d2||d1===d2) return false; }
      else if(deptFilter!=='todos' && deptFilter!=='mio') { if(d1!==deptFilter && d2!==deptFilter) return false; }
    }
    return true;
  }).sort((a,b)=>{
    if(a.isDone!==b.isDone) return a.isDone?1:-1;
    if(a.fecha&&b.fecha) return (a.fecha).localeCompare(b.fecha);
    if(a.fecha) return -1; if(b.fecha) return 1;
    return 0;
  });

  // Stats (from filtered items)
  const totalPend = filtered.filter(i=>!i.isDone).length;
  const totalDone = filtered.filter(i=>i.isDone).length;
  const vencCount = filtered.filter(i=>i._src==='venc'&&!i.isDone).length;
  const tareaCount = filtered.filter(i=>i._src==='tarea'&&!i.isDone).length;
  const vencidos = filtered.filter(i=>!i.isDone&&i.fecha&&daysUntil(i.fecha)<0).length;

  // Month navigation
  const prevMonth = async () => { let m=M-1,y=Y; if(m<1){m=12;y--} state.viewMonth=m;state.viewYear=y; await autoGenerate(y,m); render(); };
  const nextMonth = async () => { let m=M+1,y=Y; if(m>12){m=1;y++} state.viewMonth=m;state.viewYear=y; await autoGenerate(y,m); render(); };
  const isCurrentMonth = M===new Date().getMonth()+1 && Y===new Date().getFullYear();

  c.append(makeHeader('Tareas',totalPend+' pendientes \u00b7 '+totalDone+' completadas',[
    el('button',{className:'btn btn-secondary',onClick:refresh},state.syncing?'Sincronizando...':'\u21bb'),
    el('button',{className:'btn btn-secondary',onClick:()=>exportXls(filtered.map(it=>[it._src==='venc'?'Recurrente':'Puntual',it.titulo,empName(it.empresaId),it.org||'',D.empleados.find(e=>e.id===it.encargadoId)?.nombre||'',it.fecha?fmt(it.fecha):'',it.isDone?'Completada':'Pendiente']),['Tipo','Titulo','Empresa','Org','Encargado','Fecha','Estado'],'tareas_'+prefix+'.xlsx')},'\u2b07 Exportar'),
    el('button',{className:'btn btn-primary',onClick:()=>{state.modals.addTarea=true;render()}},'\u002b Tarea'),
    el('button',{className:'btn btn-primary',style:{background:'#7C3AED'},onClick:()=>{state.modals.addVenc=true;render()}},'\u002b Recurrente')
  ]));

  // Month navigator
  const monthNav = el('div',{style:{display:'flex',alignItems:'center',justifyContent:'center',gap:'16px',marginBottom:'20px',background:'#fff',borderRadius:'14px',border:'1px solid #E2E8F0',padding:'12px 24px'}});
  monthNav.append(
    el('button',{onClick:prevMonth,style:{background:'none',border:'1px solid #E2E8F0',borderRadius:'8px',width:'36px',height:'36px',cursor:'pointer',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center',color:'#64748B'},innerHTML:'&#9664;'}),
    el('div',{style:{textAlign:'center',minWidth:'180px'}},
      el('h3',{style:{margin:0,fontSize:'18px',fontWeight:800,color:'#0F172A'}},meses[M]+' '+Y),
      !isCurrentMonth?el('p',{style:{margin:'2px 0 0',fontSize:'11px',color:'#94A3B8'}},'Recurrentes de este mes'):el('p',{style:{margin:'2px 0 0',fontSize:'11px',color:'#059669',fontWeight:600}},'\u25cf Mes actual')
    ),
    el('button',{onClick:nextMonth,style:{background:'none',border:'1px solid #E2E8F0',borderRadius:'8px',width:'36px',height:'36px',cursor:'pointer',fontSize:'16px',display:'flex',alignItems:'center',justifyContent:'center',color:'#64748B'},innerHTML:'&#9654;'})
  );
  if(!isCurrentMonth) monthNav.append(el('button',{onClick:()=>{state.viewMonth=new Date().getMonth()+1;state.viewYear=new Date().getFullYear();render()},className:'btn btn-secondary',style:{marginLeft:'8px',padding:'6px 14px',fontSize:'12px'}},'Hoy'));
  c.append(monthNav);

  // Auto-gen hint
  const monthVencCount = D.vencimientos.filter(v=>(v.venc||'').startsWith(prefix)).length;
  if(monthVencCount===0 && (D.plantillas||[]).length>0) {
    c.append(el('div',{style:{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'12px',padding:'16px 20px',marginBottom:'20px',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:'10px'}},
      el('span',{style:{fontSize:'13px',color:'#92400E'}},'\u26a0 No hay recurrentes para '+meses[M]+'.'),
      el('button',{className:'btn btn-primary',style:{padding:'8px 16px',fontSize:'13px'},onClick:async()=>{await autoGenerate(Y,M);render();}},'Generar desde plantillas')
    ));
  }

  c.append(makeStats([
    {l:'Pendientes',v:totalPend,c:'#D97706'},
    {l:'Recurrentes',v:vencCount,c:'#7C3AED'},
    {l:'Puntuales',v:tareaCount,c:'#0284C7'},
    {l:'Vencidos',v:vencidos,c:'#DC2626'},
    {l:'Completados',v:totalDone,c:'#059669'}
  ]));

  // Type pills
  const typePills = el('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'16px'}});
  [{v:'todos',l:'Todos',c:'#4F46E5'},{v:'recurrente',l:'Recurrentes',c:'#7C3AED'},{v:'puntual',l:'Puntuales',c:'#0284C7'}].forEach(tp=>{
    typePills.append(el('button',{onClick:()=>{state.filters.tareaTipo=tp.v;render()},style:{border:tipo===tp.v?'2px solid '+tp.c:'2px solid #E2E8F0',background:tipo===tp.v?tp.c+'15':'#fff',color:tipo===tp.v?tp.c:'#64748B',padding:'6px 14px',borderRadius:'8px',fontSize:'12px',fontWeight:700,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}},tp.l));
  });
  // Org pills (only when showing recurrentes)
  if(tipo==='todos'||tipo==='recurrente') {
    ['todos','BPS','DGI','ANV','CONTAB.','SUELDOS'].forEach(o=>{
      typePills.append(el('button',{className:'org-btn',onClick:()=>{state.filters.org=o;render()},style:{border:state.filters.org===o?'2px solid #4F46E5':'2px solid #E2E8F0',background:state.filters.org===o?'#EEF2FF':'#fff',color:state.filters.org===o?'#4F46E5':'#94A3B8',padding:'6px 14px',borderRadius:'8px',fontSize:'11px',fontWeight:700,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"}},o==='todos'?'Org: Todos':o));
    });
  }
  c.append(typePills);

  // Department pills
  const deptPills = el('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'16px',alignItems:'center'}});
  deptPills.append(el('span',{style:{fontSize:'11px',fontWeight:600,color:'#94A3B8',marginRight:'4px'}},'Depto:'));
  let deptOpts;
  if(forcedDept) {
    // Non-admin: only own dept + cross-dept
    deptOpts = [{v:'mio',l:deptoC(myDept).label,c:deptoC(myDept).text}];
  } else {
    // Admin: all options
    deptOpts = [{v:'todos',l:'Todos',c:'#64748B'},{v:'mio',l:'Mi depto'+(myDepto()?(' ('+deptoC(myDepto()).label+')'):''),c:'#4F46E5'},...deptos.map(d=>({v:d.value,l:d.label,c:d.text}))];
  }
  deptOpts.forEach(dp=>{
    deptPills.append(el('button',{onClick:()=>{state.filters.tareaDept=dp.v;render()},style:{
      border:deptFilter===dp.v?'2px solid '+dp.c:'2px solid #E2E8F0',
      background:deptFilter===dp.v?dp.c+'15':'#fff',
      color:deptFilter===dp.v?dp.c:'#94A3B8',
      padding:'5px 12px',borderRadius:'8px',fontSize:'11px',fontWeight:700,cursor:'pointer',fontFamily:"'DM Sans',sans-serif"
    }},dp.l));
  });
  c.append(deptPills);

  // Search + filters
  const si = el('input',{className:'search-input',placeholder:'Buscar...',value:state.filters.tareaSearch,'data-fid':'search-tareas'});
  si.addEventListener('input',e=>{state.filters.tareaSearch=e.target.value;render()});
  const esSel = el('select',{className:'filter-select'});
  [{v:'todos',l:'Todos'},{v:'pendiente',l:'Pendientes'},{v:'completada',l:'Completados'}].forEach(o=>{const op=el('option',{value:o.v},o.l);if(state.filters.tareaEst===o.v)op.selected=true;esSel.append(op)});
  esSel.addEventListener('change',e=>{state.filters.tareaEst=e.target.value;render()});
  const enSel = el('select',{className:'filter-select'});
  enSel.append(el('option',{value:'todos'},'Todos encargados'),el('option',{value:''},'Sin asignar'));
  D.empleados.forEach(e=>{const o=el('option',{value:e.id},e.nombre);enSel.append(o)});
  enSel.value=state.filters.tareaEnc;
  enSel.addEventListener('change',e=>{state.filters.tareaEnc=e.target.value;render()});
  c.append(el('div',{style:{display:'flex',flexWrap:'wrap',gap:'10px',marginBottom:'20px',alignItems:'center'}},el('div',{className:'search-box'},si),esSel,enSel));

  // Cards
  const list = el('div',{style:{display:'flex',flexDirection:'column',gap:'10px'}});
  if(filtered.length===0) list.append(el('div',{className:'card',style:{padding:'48px',textAlign:'center',color:'#94A3B8'}},'Sin tareas'));

  filtered.slice(0,150).forEach(it=>{
    const isVenc = it._src==='venc';
    const item = it._item;
    const enc1 = D.empleados.find(e=>e.id===it.encargadoId);
    const enc2 = D.empleados.find(e=>e.id===it.encargadoId2);
    const has2 = !!it.encargadoId2;
    const ov = it.fecha&&!it.isDone&&daysUntil(it.fecha)<0;
    const card = el('div',{className:'tarea-card'+(ov?' overdue':'')+(it.isDone?' done':'')});

    // Tick logic
    const sheetName = isVenc?'Vencimientos':'Tareas';
    const doneState = isVenc?'completado':'completada';
    const pendState = 'pendiente';
    const updateEstado = (tickKey) => {
      const done = item[tickKey]==='true';
      if(done) {
        item[tickKey] = '';
        item.estado = (has2&&item.tick1==='true'&&item.tick2==='true')?doneState:(!has2&&item.tick1!=='true')?pendState:(has2?pendState:pendState);
        if(has2) item.estado=(item.tick1==='true'&&item.tick2==='true')?doneState:pendState;
        else item.estado=pendState;
        apiPost({action:'update',sheet:sheetName,id:item.id,data:{tick1:item.tick1||'',tick2:item.tick2||'',estado:item.estado}});render();
      } else {
        const encId = tickKey==='tick1'?it.encargadoId:it.encargadoId2;
        state.modals.completar = {type:isVenc?'venc':'tarea',item,tickKey,encargadoId:encId};
        render();
      }
    };
    const makeCheck = (tickKey, encObj) => {
      const done = item[tickKey]==='true';
      const btn = el('button',{className:'check-btn',style:{marginTop:'2px'},onClick:()=>updateEstado(tickKey)});
      btn.style.border = done?'none':'2px solid '+(encObj?.color||'#CBD5E1');
      btn.style.background = done?(encObj?.color||'#059669'):'#fff';
      btn.style.color = '#fff';
      if(done) btn.innerHTML = '\u2713';
      return btn;
    };
    const checksDiv = el('div',{style:{display:'flex',flexDirection:'column',gap:'6px',alignItems:'center'}});
    checksDiv.append(makeCheck('tick1', enc1));
    if(has2) checksDiv.append(makeCheck('tick2', enc2));

    // Type + org badge
    const typeBadge = isVenc ?
      el('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 8px',borderRadius:'4px',background:orgC(it.org).bg,color:orgC(it.org).text}},it.org) :
      el('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 8px',borderRadius:'4px',background:'#F0F9FF',color:'#0284C7'}},'Puntual');

    // Cross-department badge
    const d1=empDepto(it.encargadoId), d2=empDepto(it.encargadoId2);
    const isCrossDept = d1 && d2 && d1!==d2;
    const deptBadge = isCrossDept ? el('span',{style:{fontSize:'9px',fontWeight:700,padding:'2px 6px',borderRadius:'4px',background:'#FFF7ED',color:'#EA580C',border:'1px solid #FED7AA'}},deptoC(d1).label+' \u2192 '+deptoC(d2).label) :
      (d1 ? el('span',{style:{fontSize:'9px',fontWeight:600,padding:'2px 6px',borderRadius:'4px',background:deptoC(d1).bg+'80',color:deptoC(d1).text}},deptoC(d1).label) : '');

    const prioColors = it.prioridad==='alta'?{bg:'#FEF2F2',t:'#DC2626',b:'#FECACA'}:it.prioridad==='baja'?{bg:'#F0F9FF',t:'#0284C7',b:'#BAE6FD'}:{bg:'#FFFBEB',t:'#D97706',b:'#FDE68A'};
    const prioBadge = !isVenc ? el('span',{className:'badge',style:{background:prioColors.bg,color:prioColors.t,border:'1px solid '+prioColors.b}},it.prioridad==='alta'?'Alta':it.prioridad==='baja'?'Baja':'Media') : '';
    const titleSpan = el('span',{style:{fontSize:'14px',fontWeight:700,color:it.isDone?'#94A3B8':'#0F172A',textDecoration:it.isDone?'line-through':'none'}},it.titulo);
    const progressDiv = has2 ? el('span',{style:{fontSize:'10px',fontWeight:700,color:it.isDone?'#059669':'#D97706',background:it.isDone?'#ECFDF5':'#FFFBEB',padding:'2px 8px',borderRadius:'4px'}},(item.tick1==='true'?1:0)+(item.tick2==='true'?1:0)+'/2') : '';

    const meta = el('div',{style:{display:'flex',gap:'10px',flexWrap:'wrap',alignItems:'center'}});
    if(it.empresaId) meta.append(el('span',{style:{fontSize:'11px',color:'#64748B',background:'#F1F5F9',padding:'2px 8px',borderRadius:'4px'}},empName(it.empresaId)));
    if(enc1) meta.append(el('span',{style:{fontSize:'11px',color:enc1.color,background:enc1.color+'18',padding:'2px 8px',borderRadius:'4px',fontWeight:600}},enc1.nombre));
    if(enc2) meta.append(el('span',{style:{fontSize:'11px',color:enc2.color,background:enc2.color+'18',padding:'2px 8px',borderRadius:'4px',fontWeight:600}},enc2.nombre));
    if(it.fecha) meta.append(el('span',{style:{fontSize:'11px',fontFamily:"'DM Mono',monospace",color:ov?'#DC2626':'#64748B',fontWeight:ov?700:400}},(ov?'Vencido: ':'')+fmt(it.fecha)));
    if(it.cadenaDesc) meta.append(el('span',{style:{fontSize:'10px',color:'#7C3AED',background:'#F3E8FF',padding:'2px 8px',borderRadius:'4px',fontWeight:700}},'\u26d3 Siguiente: '+it.cadenaDesc));
    if(it.cadenaPadreId) meta.append(el('span',{style:{fontSize:'10px',color:'#059669',background:'#ECFDF5',padding:'2px 8px',borderRadius:'4px',fontWeight:700}},'\u26d3 Paso de cadena'));

    // Buttons
    const delBtn = el('button',{className:'trash-btn',style:{flexShrink:0},onClick:()=>{
      if(!confirm('Eliminar "'+it.titulo+'"?')) return;
      if(isVenc){state.data.vencimientos=state.data.vencimientos.filter(x=>x.id!==item.id);apiPost({action:'delete',sheet:'Vencimientos',id:item.id});}
      else{state.data.tareas=state.data.tareas.filter(x=>x.id!==item.id);apiPost({action:'delete',sheet:'Tareas',id:item.id});}
      render();
    },innerHTML:'\ud83d\uddd1'});
    const comBtn = el('button',{className:'trash-btn',style:{flexShrink:0,color:'#94A3B8'},onClick:()=>{state.modals.comentario={refType:isVenc?'venc':'tarea',refId:item.id,refLabel:it.titulo};render()},innerHTML:'\ud83d\udcac'});

    // Encargado selects for vencimientos
    const encCell = isVenc ? el('div',{style:{display:'flex',gap:'4px',marginTop:'4px'}}) : '';
    if(isVenc) {
      const es1=el('select',{className:'enc-select'});es1.append(el('option',{value:''},'\u2014'));
      D.empleados.forEach(e=>{const o=el('option',{value:e.id},e.nombre);if(item.encargadoId===e.id)o.selected=true;es1.append(o)});
      es1.addEventListener('change',e=>{item.encargadoId=e.target.value;apiPost({action:'update',sheet:'Vencimientos',id:item.id,data:{encargadoId:e.target.value}});render()});
      const es2=el('select',{className:'enc-select',style:{fontSize:'10px'}});es2.append(el('option',{value:''},'+ 2do'));
      D.empleados.forEach(e=>{const o=el('option',{value:e.id},e.nombre);if(item.encargadoId2===e.id)o.selected=true;es2.append(o)});
      es2.addEventListener('change',e=>{item.encargadoId2=e.target.value;item.tick2='';apiPost({action:'update',sheet:'Vencimientos',id:item.id,data:{encargadoId2:e.target.value,tick2:''}});render()});
      encCell.append(es1,es2);
    }

    const comments = (D.comentarios||[]).filter(cm=>cm.refId===item.id).sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
    const comSection = comments.length ? el('div',{style:{marginTop:'8px',paddingTop:'8px',borderTop:'1px solid #F1F5F9'}}) : '';
    if(comments.length) {
      comments.slice(-2).forEach(cm=>{comSection.append(el('div',{style:{fontSize:'11px',color:'#475569',marginBottom:'4px'}},el('span',{style:{fontWeight:700,color:'#4F46E5'}},cm.autor||''),' ',cm.texto,el('span',{style:{marginLeft:'8px',color:'#CBD5E1',fontSize:'10px'}},fmt(cm.fecha))));});
      if(comments.length>2) comSection.prepend(el('div',{style:{fontSize:'10px',color:'#94A3B8',marginBottom:'4px'}},'... '+(comments.length-2)+' mas'));
    }

    const btnDiv = el('div',{style:{display:'flex',flexDirection:'column',gap:'4px',alignItems:'center'}});
    btnDiv.append(comBtn);
    // Edit button
    const editBtn = el('button',{className:'trash-btn',style:{flexShrink:0,color:'#64748B'},onClick:()=>{
      state.modals.editTarea={item,isVenc};render();
    },innerHTML:'\u270f'});
    btnDiv.append(editBtn);
    if(!isVenc) btnDiv.append(el('button',{className:'trash-btn',style:{flexShrink:0,color:it.cadenaDesc?'#7C3AED':'#CBD5E1'},onClick:()=>{state.modals.editCadena={tarea:item};render()},innerHTML:'\u26d3'}));
    btnDiv.append(delBtn);
    if(comments.length) btnDiv.prepend(el('span',{style:{fontSize:'9px',fontWeight:700,color:'#4F46E5'}},String(comments.length)));

    card.append(el('div',{style:{display:'flex',alignItems:'flex-start',gap:'12px'}},
      checksDiv,
      el('div',{style:{flex:1,minWidth:0}},
        el('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',marginBottom:'4px'}},typeBadge,deptBadge,titleSpan,prioBadge,progressDiv),
        it.desc?el('p',{style:{margin:'0 0 6px',fontSize:'13px',color:'#64748B'}},it.desc):'',
        meta,
        encCell,
        comSection
      ),
      btnDiv
    ));
    list.append(card);
  });
  c.append(list);
}

// ===== EMPRESAS =====
function renderEmpresas(c) {
  if(state.selEmp) { renderEmpresaDetail(c); return; }
  const D=state.data;
  c.append(makeHeader('Empresas ('+D.empresas.length+')',null,[
    el('button',{className:'btn btn-secondary',onClick:()=>exportXls(sortedEmps().map(e=>[e.nombre,catLabel(e.categoria),catLabel(e.categoria2),e.rut||'',e.claves?.bps||'',e.claves?.dgi||'',e.claves?.anv||'',e.fecha_bce||'',e.carpeta||'',e.notas||'']),['Nombre','Cat.1','Cat.2','RUT','BPS','DGI','ANV','Fecha BCE','Carpeta','Notas'],'empresas.xlsx')},'\u2b07 Exportar'),
    el('button',{className:'btn btn-primary',onClick:()=>{state.modals.addEmp=true;render()}},'\u002b Nueva')
  ]));
  const si=el('input',{className:'search-input',placeholder:'Buscar por nombre, RUT o BPS...',value:state.search,'data-fid':'search-emp'});
  si.addEventListener('input',e=>{state.search=e.target.value;render()});

  // Category filter pills - ordered: general | cede/no cede | otros
  const catRow = el('div',{style:{display:'flex',flexWrap:'wrap',gap:'8px',marginBottom:'16px',alignItems:'center'}});
  const cats = getCatEmpresas();
  const topRow = [{value:'todos',label:'Todos',bg:'#F1F5F9',text:'#4F46E5'}];
  const sinAct = cats.find(c=>c.value==='sin_actividad');
  const sinCat = cats.find(c=>c.value==='');
  if(sinCat) topRow.push(sinCat);
  if(sinAct) topRow.push(sinAct);
  const midRow = [cats.find(c=>c.value==='cede'), cats.find(c=>c.value==='no_cede')].filter(Boolean);
  const skip = new Set(['','sin_actividad','cede','no_cede']);
  const restRow = cats.filter(c=>!skip.has(c.value));
  const orderedCats = [...topRow, null, ...midRow, null, ...restRow]; // null = separator

  orderedCats.forEach(cat=>{
    if(cat===null) { catRow.append(el('span',{style:{width:'1px',height:'20px',background:'#E2E8F0',margin:'0 4px'}})); return; }
    const v = cat.value;
    const active = state.filters.empCat===v;
    const cnt = v==='todos'?D.empresas.filter(e=>(e.categoria||'')!=='sin_actividad'&&(e.categoria2||'')!=='sin_actividad').length:v===''?D.empresas.filter(e=>!e.categoria&&!e.categoria2).length:D.empresas.filter(e=>e.categoria===v||e.categoria2===v).length;
    catRow.append(el('button',{onClick:()=>{state.filters.empCat=v;render()},style:{
      border:active?'2px solid '+(v==='todos'?'#4F46E5':cat.text):'2px solid #E2E8F0',
      background:active?(v==='todos'?'#EEF2FF':cat.bg):'#fff',
      color:active?(v==='todos'?'#4F46E5':cat.text):'#64748B',

    }},cat.label+(cnt?' ('+cnt+')':'')));

  c.append(el('div',{style:{display:'flex',flexWrap:'wrap',gap:'10px',marginBottom:'20px',alignItems:'center'}},el('div',{style:{maxWidth:'400px',flex:'1 1 220px'},className:'search-box'},si)));
  c.append(catRow);

  const q=state.search.toLowerCase();
  const filtE=D.empresas.filter(e=>{
    if(q && !e.nombre.toLowerCase().includes(q) && !(e.rut||'').toLowerCase().includes(q) && !(e.notas||'').toLowerCase().includes(q) && !(e.claves?.bps||'').includes(q)) return false;
    if(state.filters.empCat==='todos') {
      if((e.categoria||'')==='sin_actividad' || (e.categoria2||'')==='sin_actividad') return false;
    } else {
      if(state.filters.empCat==='' && ((e.categoria||'')!=='' || (e.categoria2||'')!=='')) return false;
      if(state.filters.empCat!=='' && e.categoria!==state.filters.empCat && (e.categoria2||'')!==state.filters.empCat) return false;
    }
    return true;
  }).sort((a,b)=>{
    const s=state.filters.empSort, dir=state.filters.empSortDir==='asc'?1:-1;
    if(s==='rut') return dir*((a.rut||'').localeCompare(b.rut||''));
    if(s==='bce') { const ma=mesNum[(a.fecha_bce||'').toLowerCase()]||99, mb=mesNum[(b.fecha_bce||'').toLowerCase()]||99; return dir*(ma-mb); }
    if(s==='cat1') return dir*(catLabel(a.categoria)||'zzz').localeCompare(catLabel(b.categoria)||'zzz');
    if(s==='cat2') return dir*(catLabel(a.categoria2)||'zzz').localeCompare(catLabel(b.categoria2)||'zzz');
    return dir*(a.nombre||'').localeCompare(b.nombre||'');
  });

  c.append(el('p',{style:{fontSize:'12px',color:'#94A3B8',marginBottom:'12px'}},filtE.length+' empresas'));

  const toggleSort = col => { if(state.filters.empSort===col) state.filters.empSortDir=state.filters.empSortDir==='asc'?'desc':'asc'; else { state.filters.empSort=col; state.filters.empSortDir='asc'; } render(); };
  const sortIcon = col => { if(state.filters.empSort!==col) return ' \u2195'; return state.filters.empSortDir==='asc'?' \u25b2':' \u25bc'; };
  const sortStyle = {cursor:'pointer',userSelect:'none'};

  const table = el('table',{className:'table'});
  const thNombre=el('th',{style:sortStyle,onClick:()=>toggleSort('nombre')},'Nombre'+sortIcon('nombre'));
  const thRut=el('th',{style:sortStyle,onClick:()=>toggleSort('rut')},'RUT'+sortIcon('rut'));
  const thCat1=el('th',{style:sortStyle,onClick:()=>toggleSort('cat1')},'Cat. 1'+sortIcon('cat1'));
  const thCat2=el('th',{style:sortStyle,onClick:()=>toggleSort('cat2')},'Cat. 2'+sortIcon('cat2'));
  const thBce=el('th',{style:sortStyle,onClick:()=>toggleSort('bce')},'BCE'+sortIcon('bce'));
  table.append(el('thead',{},el('tr',{},thNombre,thRut,el('th',{},'BPS'),thCat1,thCat2,thBce,el('th',{},'Carpeta'),el('th',{},'Encargado'),el('th',{},''))));
  const tbody = el('tbody');
  filtE.slice(0,300).forEach(e=>{
    const cc = catC(e.categoria);
    const cc2 = e.categoria2 ? catC(e.categoria2) : null;
    const encInfo = (e.notas||'').match(/Enc:\s*([^|]+)/);
    const encName = encInfo ? encInfo[1].trim() : '';
    const bpsInfo = (e.notas||'').match(/BPS:\s*([^|]+)/);
    const bpsNum = bpsInfo ? bpsInfo[1].trim() : '';

    const cat1Badge = e.categoria ? el('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 6px',borderRadius:'4px',background:cc.bg,color:cc.text}},cc.label) : el('span',{style:{fontSize:'11px',color:'#CBD5E1'}},'\u2014');
    const cat2Badge = cc2 ? el('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 6px',borderRadius:'4px',background:cc2.bg,color:cc2.text}},cc2.label) : el('span',{style:{fontSize:'11px',color:'#CBD5E1'}},'\u2014');

    const tr = el('tr',{style:{cursor:'pointer'},onClick:()=>{state.selEmp=e.id;render()}});
    tr.addEventListener('mouseenter',()=>tr.style.background='#F8FAFC');
    tr.addEventListener('mouseleave',()=>tr.style.background='');
    tr.append(
      el('td',{style:{fontWeight:600,color:'#0F172A',maxWidth:'250px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},e.nombre),
      el('td',{style:{fontFamily:"'DM Mono',monospace",fontSize:'12px',color:'#64748B',whiteSpace:'nowrap'}},e.rut||''),
      el('td',{style:{fontFamily:"'DM Mono',monospace",fontSize:'11px',color:'#94A3B8',whiteSpace:'nowrap'}},bpsNum||'\u2014'),
      el('td',{},cat1Badge),
      el('td',{},cat2Badge),
      el('td',{style:{fontSize:'12px',color:'#7C3AED',fontWeight:e.fecha_bce?600:400}},e.fecha_bce||'\u2014'),
      el('td',{style:{fontSize:'11px',color:'#64748B',maxWidth:'120px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},e.carpeta||'\u2014'),
      el('td',{style:{fontSize:'12px',color:'#64748B',maxWidth:'150px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},encName||e.encargado||'\u2014'),
      el('td',{style:{fontSize:'11px',color:'#94A3B8'}},e.claves?.dgi?'\ud83d\udd11':'')
    );
    tbody.append(tr);
  });
  table.append(tbody);
  c.append(el('div',{style:{background:'#fff',borderRadius:'14px',border:'1px solid #E2E8F0',overflow:'hidden'}},el('div',{style:{overflowX:'auto'}},table)));
}

// ===== HORAS =====
function renderHoras(c) {
  const D=state.data;
  const f=state.filters;
  const empDepto = id => (D.empleados.find(e=>e.id===id)||{}).departamento||'';
  const myDept = myDepto();
  const forcedDept = (!state.isAdmin && myDept) ? myDept : null;

  // Filter
  const filtered = D.horasTrabajadas.filter(h=>{
    if(forcedDept && empDepto(h.empleadoId)!==myDept) return false;
    if(f.horasEnc!=='todos' && h.empleadoId!==f.horasEnc) return false;
    if(f.horasEmp!=='todos' && h.empresaId!==f.horasEmp) return false;
    if(f.horasDesde && (h.fecha||'')<f.horasDesde) return false;
    if(f.horasHasta && (h.fecha||'')>f.horasHasta) return false;

  c.append(el('div',{style:{display:'flex',flexWrap:'wrap',gap:'10px',marginBottom:'20px',alignItems:'center'}},

function makeFormField(label,type,value,ph) {
  const wrap=el('div',{style:{marginBottom:'16px'}});
  wrap.append(el('label',{style:{display:'block',fontSize:'12px',fontWeight:600,color:'#64748B',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'0.05em'}},label));
  if(type==='select') {
    const sel=el('select',{className:'select'});
    value.options.forEach(o=>{const op=el('option',{value:o.value},o.label);if(value.selected===o.value)op.selected=true;sel.append(op)});
    wrap.append(sel); wrap._input=sel;
  } else if(type==='textarea') {
    const ta=el('textarea',{value:value||'',placeholder:ph||'',style:{width:'100%',minHeight:'60px',padding:'10px 14px',border:'2px solid #E2E8F0',borderRadius:'10px',fontSize:'14px',fontFamily:"'DM Sans',sans-serif",outline:'none',resize:'vertical',boxSizing:'border-box',background:'#FAFBFC'}});
    wrap.append(ta); wrap._input=ta;
  } else {
    const inp=el('input',{type:type||'text',value:value||'',placeholder:ph||'',className:'input'});
    wrap.append(inp); wrap._input=inp;
  }
  return wrap;
}

// ===== PLANTILLAS (templates for recurring obligations) =====
function renderPlantillas(c) {
  const D = state.data;
  const empDepto = id => (D.empleados.find(e=>e.id===id)||{}).departamento||'';
  const myDept = myDepto();
  const forcedDept = (!state.isAdmin && myDept) ? myDept : null;
  const allPlants = D.plantillas||[];
  const plants = forcedDept ? allPlants.filter(p=>{
    const d1=empDepto(p.encargadoId), d2=empDepto(p.encargadoId2);
    return d1===myDept || d2===myDept;
  }) : allPlants;

  c.append(makeHeader('Plantillas Recurrentes',
    plants.length+' obligaciones mensuales',
    [
      el('button',{className:'btn btn-secondary',onClick:()=>exportXls(plants.sort((a,b)=>(Number(a.dia)||0)-(Number(b.dia)||0)).map(p=>[p.dia,empName(p.empresaId),p.org,p.obligacion,state.data.empleados.find(e=>e.id===p.encargadoId)?.nombre||'Sin asignar',state.data.empleados.find(e=>e.id===p.encargadoId2)?.nombre||'']),['Dia','Empresa','Org','Obligacion','Encargado 1','Encargado 2'],'plantillas.xlsx')},'\u2b07 Exportar'),
      el('button',{className:'btn btn-primary',onClick:()=>{state.modals.addPlant=true;render()}},'\u002b Nueva Plantilla')
    ]
  ));

  // Explanation card
  c.append(el('div',{style:{background:'#EEF2FF',border:'1px solid #C7D2FE',borderRadius:'12px',padding:'16px 20px',marginBottom:'24px',fontSize:'13px',color:'#4338CA',lineHeight:'1.6'}},
    el('strong',{},'Como funciona: '),
    'Las plantillas definen las obligaciones que se repiten todos los meses. El dia 1 de cada mes, al entrar en "Recurrentes", se generan automaticamente los vencimientos del mes con las fechas de estas plantillas. Podes editar la lista aca y agregar/eliminar obligaciones.'
  ));

  if(plants.length===0) {
    c.append(el('div',{style:{background:'#fff',borderRadius:'14px',border:'1px solid #E2E8F0',padding:'48px',textAlign:'center'}},
      el('p',{style:{color:'#94A3B8',fontSize:'14px',marginBottom:'16px'}},'No hay plantillas todavia.'),
      el('p',{style:{color:'#94A3B8',fontSize:'13px',marginBottom:'20px'}},'Podes importar los vencimientos de Marzo como plantillas:'),
      el('button',{className:'btn btn-primary',onClick:async()=>{
        const marchVencs = state.data.vencimientos.filter(v=>(v.venc||'').startsWith('2026-03'));
        if(!marchVencs.length){state.error='No hay vencimientos en Marzo 2026 para importar';render();return;}
        for(const v of marchVencs){
          const dia = Number((v.venc||'').split('-')[2])||1;
          const p = {id:'pl'+Date.now()+Math.random().toString(36).slice(2,6),dia:String(dia),empresaId:v.empresaId,org:v.org,obligacion:v.obligacion,encargadoId:v.encargadoId||'',encargadoId2:v.encargadoId2||''};
          if(!state.data.plantillas) state.data.plantillas=[];

function renderAccesos(c) {
  const accesos = state.data.accesos||[];
  const activos = accesos.filter(a=>a.activo!=='false'&&a.activo!=='no');
  const inactivos = accesos.filter(a=>a.activo==='false'||a.activo==='no');

  // Find employees without access
  const accNames = accesos.map(a=>(a.nombre||'').toLowerCase().trim());
  const sinAcceso = state.data.empleados.filter(e=>!accNames.includes((e.nombre||'').toLowerCase().trim()));

  c.append(makeHeader('Gestion de Accesos',
    activos.length+' activos \u00b7 '+inactivos.length+' revocados',
    [
      sinAcceso.length?el('button',{className:'btn btn-secondary',onClick:async()=>{
        if(!confirm('Crear acceso para '+sinAcceso.length+' empleado(s) sin acceso?')) return;
        for(const emp of sinAcceso) {
          const code = Math.random().toString(36).slice(2,8).toUpperCase();
          const a={id:'acc'+Date.now()+Math.random().toString(36).slice(2,5),nombre:emp.nombre,empleadoId:emp.id,codigo:code,rol:'usuario',activo:'true',fechaCreacion:todayStr};
          state.data.accesos.push(a);
          await apiPost({action:'add',sheet:'Accesos',data:a});
        }
        render();
      }},'\u26a1 Crear accesos ('+sinAcceso.length+' pendientes)'):'',
      el('button',{className:'btn btn-primary',onClick:()=>{state.modals.addAcceso=true;render()}},'\u002b Nuevo Acceso')
    ]
  ));

  c.append(el('div',{style:{background:'#EEF2FF',border:'1px solid #C7D2FE',borderRadius:'12px',padding:'16px 20px',marginBottom:'24px',fontSize:'13px',color:'#4338CA',lineHeight:'1.6'}},
    el('strong',{},'Como funciona: '),
    'Cada persona recibe un codigo de acceso unico. Para sacar el acceso a alguien, apreta "Revocar" y no podra entrar mas. El codigo de admin siempre tiene acceso completo.'
  ));

  // Show link status
  if(sinAcceso.length) {
    const missing = el('div',{style:{background:'#FFFBEB',border:'1px solid #FDE68A',borderRadius:'12px',padding:'16px 20px',marginBottom:'24px'}});
    missing.append(el('p',{style:{fontSize:'13px',fontWeight:700,color:'#92400E',marginBottom:'8px'}},'\u26a0 '+sinAcceso.length+' empleado(s) sin acceso:'));
    const chips = el('div',{style:{display:'flex',flexWrap:'wrap',gap:'6px'}});
    sinAcceso.forEach(e=>{
      chips.append(el('span',{style:{fontSize:'12px',padding:'4px 10px',borderRadius:'6px',background:'#FEF3C7',color:'#92400E',fontWeight:600}},e.nombre));
    });
    missing.append(chips);
    c.append(missing);
  }

  if(!accesos.length) {
    c.append(el('div',{className:'card',style:{padding:'48px',textAlign:'center'}},
      el('p',{style:{color:'#94A3B8',fontSize:'14px',marginBottom:'12px'}},'No hay codigos de acceso creados.'),
      el('p',{style:{color:'#94A3B8',fontSize:'13px'}},'Crea el primer codigo con el boton de arriba.')
    ));
    return;
  }

  const table = el('table',{className:'table'});
  table.append(el('thead',{},el('tr',{},
    ...['Nombre','Empleado','Codigo','Rol','Estado','Creado','Acciones'].map(h=>el('th',{},h))
  )));
  const tbody=el('tbody');
  accesos.forEach(a=>{
    const isActive = a.activo!=='false' && a.activo!=='no';
    const isAdm = a.rol==='admin';
    const isSelf = a.codigo===state.accessCode;

    const statusBadge = el('span',{className:'badge',style:{background:isActive?'#ECFDF5':'#FEF2F2',color:isActive?'#059669':'#DC2626',border:'1px solid '+(isActive?'#A7F3D0':'#FECACA')}},isActive?'Activo':'Revocado');
    const rolBadge = el('span',{className:'badge',style:{
      background:isAdm?'#FEF3C7':'#F0F9FF',
      color:isAdm?'#B45309':'#0284C7',
      border:'1px solid '+(isAdm?'#FDE68A':'#BAE6FD')
    }},isAdm?'Admin':'Usuario');

    const actionsDiv = el('div',{style:{display:'flex',gap:'6px'}});
    if(!isSelf) {
      if(isActive) {
        actionsDiv.append(el('button',{className:'btn btn-danger',style:{padding:'5px 12px',fontSize:'11px'},onClick:()=>{
          a.activo='false';
          apiPost({action:'update',sheet:'Accesos',id:a.id,data:{activo:'false'}});
          render();
        }},'Revocar'));
      } else {
        actionsDiv.append(el('button',{className:'btn btn-secondary',style:{padding:'5px 12px',fontSize:'11px'},onClick:()=>{
          a.activo='true';
          apiPost({action:'update',sheet:'Accesos',id:a.id,data:{activo:'true'}});
          render();
        }},'Reactivar'));
      }
      actionsDiv.append(el('button',{className:'trash-btn',onClick:()=>{
        if(!confirm('Eliminar acceso de '+a.nombre+'?')) return;
        state.data.accesos=state.data.accesos.filter(x=>x.id!==a.id);
        apiPost({action:'delete',sheet:'Accesos',id:a.id});
        render();
      },innerHTML:'\ud83d\uddd1'}));
    } else {
      actionsDiv.append(el('span',{style:{fontSize:'11px',color:'#94A3B8',fontStyle:'italic'}},'(Tu cuenta)'));
    }

    const empLinked = a.empleadoId ? state.data.empleados.find(e=>e.id===a.empleadoId) : null;
    const empCell = empLinked ? el('span',{style:{fontSize:'12px',fontWeight:600,color:empLinked.color||'#4F46E5'}},empLinked.nombre) : el('span',{style:{fontSize:'11px',color:'#CBD5E1'}},'\u2014');

    tbody.append(el('tr',{style:{opacity:isActive?1:0.5}},
      el('td',{style:{fontWeight:600,color:'#0F172A'}},a.nombre||'\u2014'),
      el('td',{},empCell),
      el('td',{style:{fontFamily:"'DM Mono',monospace",fontSize:'12px',color:'#64748B'}},a.codigo),
      el('td',{},rolBadge),
      el('td',{},statusBadge),
      el('td',{style:{fontSize:'12px',color:'#94A3B8'}},a.fechaCreacion?fmt(a.fechaCreacion):'\u2014'),
      el('td',{},actionsDiv)
    ));
  });
  table.append(tbody);
  c.append(el('div',{style:{background:'#fff',borderRadius:'14px',border:'1px solid #E2E8F0',overflow:'hidden'}},el('div',{style:{overflowX:'auto'}},table)));
}
